/* ── LABELS PAGE ─────────────────────────────────────────── */
function LabelsPage({inventory,T}){
  const [search,setSearch]=useState('');
  const [selected,setSelected]=useState(new Set());
  const [tmpl,setTmpl]=useState('Avery 5160');
  const [byQty,setByQty]=useState(false);
  const [showPrint,setShowPrint]=useState(false);
  const tmpls=['Avery 5160','Avery 8160','Dymo 30252','Zebra 2x1'];
  const tmplDesc={'Avery 5160':'30 per page · 1" × 2.625"','Avery 8160':'30 per page · inkjet optimized','Dymo 30252':'1 per sheet · 1.125" × 3.5"','Zebra 2x1':'1" × 2" direct thermal'};
  const filtered=inventory.filter(i=>!search||(i.title+i.sku).toLowerCase().includes(search.toLowerCase()));
  function toggle(id){const s=new Set(selected);s.has(id)?s.delete(id):s.add(id);setSelected(s);}
  function toggleAll(){selected.size===filtered.length?setSelected(new Set()):setSelected(new Set(filtered.map(i=>i.id)));}
  const labelCount=byQty?[...selected].reduce((s,id)=>{const it=inventory.find(i=>i.id===id);return s+(it?it.qty:1);},0):selected.size;
  const statusColor={Listed:T.cyan,Sold:T.success,Unlisted:T.warning,Returned:T.danger};
  return(
    <div style={{padding:'24px 28px',overflowY:'auto',flex:1}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div style={{fontSize:26,fontWeight:800,color:T.text,letterSpacing:-0.5}}>Labels</div>
        {selected.size>0&&<Btn ic="print" T={T} onClick={()=>setShowPrint(true)}>Print {labelCount} Label{labelCount!==1?'s':''}</Btn>}
      </div>
      {/* Template */}
      <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:18,padding:'18px 22px',marginBottom:14,boxShadow:`0 1px 4px ${T.shadow}`}}>
        <div style={{fontSize:11,fontWeight:700,color:T.muted,letterSpacing:.8,textTransform:'uppercase',marginBottom:12}}>Label Template</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:14}}>
          {tmpls.map(t=>(
            <button key={t} onClick={()=>setTmpl(t)} style={{background:tmpl===t?BRAND.yellow:T.surface,color:tmpl===t?'#111':T.muted,border:`1px solid ${tmpl===t?BRAND.yellow:T.border}`,borderRadius:10,padding:'8px 16px',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:"'Inter',sans-serif",transition:'all .14s'}}>{t}</button>
          ))}
        </div>
        <div style={{fontSize:12,color:T.muted,marginBottom:14}}>{tmplDesc[tmpl]}</div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <input type="checkbox" id="byqtylbl" checked={byQty} onChange={e=>setByQty(e.target.checked)} style={{width:16,height:16,accentColor:BRAND.yellow,cursor:'pointer'}}/>
          <label htmlFor="byqtylbl" style={{fontSize:14,color:T.text,cursor:'pointer'}}>Print by Quantity — one label per unit (e.g. qty 10 = 10 labels)</label>
        </div>
      </div>
      {/* Search + select all */}
      <div style={{display:'flex',gap:10,marginBottom:12,alignItems:'center'}}>
        <div style={{flex:1,display:'flex',alignItems:'center',background:T.inputBg,border:`1.5px solid ${T.border}`,borderRadius:12,padding:'0 14px',gap:8}}>
          <Icon name="search" size={15} color={T.muted}/>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by title or SKU…" style={{background:'transparent',border:'none',outline:'none',color:T.text,padding:'10px 0',fontSize:14,width:'100%'}}/>
        </div>
        <button onClick={toggleAll} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:'9px 14px',fontSize:13,fontWeight:600,color:T.muted,cursor:'pointer',fontFamily:"'Inter',sans-serif",display:'flex',alignItems:'center',gap:6}}>
          <Icon name={selected.size===filtered.length?'check':'layers'} size={14} color={T.muted}/>
          {selected.size===filtered.length?'Deselect All':'Select All'}
        </button>
      </div>
      {selected.size>0&&(
        <div style={{background:BRAND.yellow+'18',border:`1px solid ${BRAND.yellow}38`,borderRadius:12,padding:'12px 16px',marginBottom:12,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{fontSize:13,fontWeight:600,color:T.text}}>{selected.size} item{selected.size!==1?'s':''} selected · {labelCount} label{labelCount!==1?'s':''} to print</span>
          <Btn sm ic="print" T={T} onClick={()=>setShowPrint(true)}>Print Labels</Btn>
        </div>
      )}
      <div style={{display:'flex',flexDirection:'column',gap:7}}>
        {filtered.map(item=>{
          const isSel=selected.has(item.id);
          const sc=statusColor[item.status]||T.muted;
          return(
            <div key={item.id} onClick={()=>toggle(item.id)}
              style={{background:T.card,border:`1.5px solid ${isSel?BRAND.yellow:T.border}`,borderRadius:13,padding:'12px 16px',display:'flex',alignItems:'center',gap:14,cursor:'pointer',transition:'border-color .14s',boxShadow:`0 1px 3px ${T.shadow}`}}>
              <div style={{width:22,height:22,borderRadius:6,border:`2px solid ${isSel?BRAND.yellow:T.muted||T.border}`,background:isSel?BRAND.yellow:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                {isSel&&<Icon name="check" size={13} color="#111" strokeWidth={2.5}/>}
              </div>
              <div style={{width:40,height:40,borderRadius:10,background:T.surface,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>
                {item.category==='Video Games'?'🎮':item.category==='Electronics'?'📱':item.category==='Clothing'?'👕':'📦'}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:600,color:T.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.title}</div>
                <div style={{display:'flex',gap:6,alignItems:'center',marginTop:4,flexWrap:'wrap'}}>
                  <Badge text={item.sku} color={BRAND.magenta} T={T}/>
                  <span style={{fontSize:12,color:T.muted}}>{item.category}</span>
                  {item.location&&<span style={{fontSize:11,color:T.muted,display:'flex',alignItems:'center',gap:3}}><Icon name="mappin" size={11} color={T.muted}/>  {item.location}</span>}
                </div>
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                <div style={{fontSize:14,fontWeight:700,color:T.text}}>${item.price}</div>
                <div style={{fontSize:11,color:T.muted,marginBottom:4}}>qty: {item.qty||1}</div>
                <Badge text={item.status} color={sc} T={T}/>
              </div>
              <Icon name="qr" size={22} color={isSel?BRAND.yellow:T.muted||T.border}/>
            </div>
          );
        })}
        {filtered.length===0&&(
          <div style={{textAlign:'center',padding:'56px 24px',color:T.muted}}>
            <Icon name="label" size={48} color={T.muted} style={{opacity:.3}}/>
            <div style={{fontSize:16,fontWeight:700,color:T.text,marginTop:14}}>No items found</div>
          </div>
        )}
      </div>
      {showPrint&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:300,backdropFilter:'blur(4px)'}} onClick={()=>setShowPrint(false)}>
          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:22,padding:28,width:440,boxShadow:'0 24px 64px rgba(0,0,0,.35)'}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:22}}>
              <div style={{fontSize:17,fontWeight:700,color:T.text}}>Print Labels</div>
              <button onClick={()=>setShowPrint(false)} style={{background:T.surface,border:'none',borderRadius:9,padding:7,cursor:'pointer'}}><Icon name="x" size={15} color={T.muted}/></button>
            </div>
            <div style={{background:T.surface,border:`1.5px solid ${BRAND.yellow}38`,borderRadius:14,padding:'16px 18px',marginBottom:16,display:'flex',alignItems:'center',gap:14}}>
              <div style={{width:52,height:52,borderRadius:12,background:T.card,display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="qr" size={28} color={BRAND.yellow}/></div>
              <div><div style={{fontSize:15,fontWeight:700,color:T.text}}>{tmpl}</div><div style={{fontSize:13,color:T.muted,marginTop:2}}>{tmplDesc[tmpl]}</div></div>
            </div>
            <div style={{background:T.surface,borderRadius:12,padding:'14px 16px',marginBottom:16}}>
              {[['Items selected',selected.size],['Labels to print',labelCount],['Print by quantity',byQty?'Yes':'No']].map(([l,v])=>(
                <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:`1px solid ${T.border}`}}>
                  <span style={{fontSize:14,color:T.muted}}>{l}</span>
                  <span style={{fontSize:14,fontWeight:700,color:T.text}}>{v}</span>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:10}}>
              <Btn v="ghost" onClick={()=>setShowPrint(false)} T={T}>Cancel</Btn>
              <Btn ic="print" T={T} full onClick={()=>{alert(`Sending ${labelCount} label${labelCount!==1?'s':''} to printer...\n\nTemplate: ${tmpl}\nItems: ${selected.size}`);setShowPrint(false);}}>
                Print {labelCount} Label{labelCount!==1?'s':''}
              </Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


/* ── IMPORT / EXPORT PAGE ────────────────────────────────── */
function ExportPage({inventory,expenses,mileage,setInventory,biz,setBiz,T}){
  const skuPrefixForImport=(biz&&biz.skuPrefix!==undefined)?biz.skuPrefix:'RRH-';
  const skuNextForImport=(biz&&biz.skuNext!==undefined)?biz.skuNext:1;
  const skuPadForImport=(biz&&biz.skuPad!==undefined)?biz.skuPad:4;
  const [tab,setTab]=useState('export');
  const [year,setYear]=useState(new Date().getFullYear().toString());
  const [exportDone,setExportDone]=useState('');
  const [importing,setImporting]=useState(false);
  const [dragOver,setDragOver]=useState(false);
  const [importRows,setImportRows]=useState(null);
  const [importMsg,setImportMsg]=useState('');
  const [importType,setImportType]=useState('inventory');
  const fileInputRef=React.useRef(null);

  /* ── CSV download helper ── */
  function downloadCSV(rows,filename){
    const csv=rows.map(r=>
      r.map(v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"').join(',')
    ).join('\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download=filename;
    a.style.display='none';
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},200);
  }

  function exportInventory(){
    downloadCSV([
      ['SKU','Title','Category','Brand','Condition','Qty','Cost','Price',
       'Status','Platform','Location','Notes','Date Added',
       'Item Number','Custom Label','Format','Currency','Start Price','Current Price',
       'Watchers','Bids','Start Date','End Date','eBay Category','eBay Category #',
       'eBay Product ID','Listing Site','UPC','EAN','ISBN'],
      ...inventory.map(i=>[
        i.sku||'',i.title||'',i.category||'',i.brand||'',i.condition||'',
        i.qty||1,parseFloat(i.cost||0).toFixed(2),parseFloat(i.price||0).toFixed(2),
        i.status||'',i.platform||'',i.location||'',i.notes||'',i.dateAdded||'',
        i.itemNumber||'',i.customSku||'',i.format||'',i.currency||'',i.startPrice||'',i.currentPrice||'',
        i.watchers||'',i.bids||'',i.startDate||'',i.endDate||'',i.ebayCategory||'',i.ebayCategoryId||'',
        i.ebayProductId||'',i.listingSite||'',i.upc||'',i.ean||'',i.isbn||''
      ])
    ],`rrh-inventory-${year}.csv`);
    setExportDone('Inventory exported — check your Downloads folder.');
    setTimeout(()=>setExportDone(''),4000);
  }

  function exportExpenses(){
    downloadCSV([
      ['Date','Description','Category','Amount','Recurring','Notes'],
      ...expenses.map(e=>[
        e.date||'',e.title||'',e.category||'',
        parseFloat(e.amount||0).toFixed(2),e.recurring?'Yes':'No',e.notes||''
      ])
    ],`rrh-expenses-${year}.csv`);
    setExportDone('Expenses exported — check your Downloads folder.');
    setTimeout(()=>setExportDone(''),4000);
  }

  function exportMileage(){
    downloadCSV([
      ['Date','From','To','Miles','Purpose','Deduction'],
      ...mileage.map(m=>[
        m.date||'',m.from||'',m.to||'',m.miles||0,
        m.purpose||'',parseFloat(m.deduction||0).toFixed(2)
      ])
    ],`rrh-mileage-${year}.csv`);
    setExportDone('Mileage exported — check your Downloads folder.');
    setTimeout(()=>setExportDone(''),4000);
  }

  /* ── CSV parser ── */
  function parseCSV(text){
    const lines=text.trim().split('\n').filter(l=>l.trim());
    if(lines.length<2)return null;
    function splitLine(line){
      const vals=[];let cur='';let inQ=false;
      for(let i=0;i<line.length;i++){
        const ch=line[i];
        if(ch==='"'){
          if(inQ&&line[i+1]==='"'){cur+='"';i++;}
          else{inQ=!inQ;}
        } else if(ch===','&&!inQ){vals.push(cur.trim());cur='';}
        else{cur+=ch;}
      }
      vals.push(cur.trim());
      return vals;
    }
    const headers=splitLine(lines[0]).map(h=>h.toLowerCase().replace(/[^a-z]/g,''));
    return lines.slice(1).map((line,i)=>{
      const vals=splitLine(line);
      const obj={};
      headers.forEach((h,j)=>{
        const val=(vals[j]||'').replace(/^"|"$/g,'').trim();
        /* when two columns normalize to the same key (e.g. eBay category 1/2 name),
           keep the first non-empty value instead of letting a later empty one clobber it */
        if(!(h in obj)||(!obj[h]&&val))obj[h]=val;
      });
      return obj;
    }).filter(r=>Object.values(r).some(v=>v));
  }

  /* ── Handle file (from drop OR file picker) ── */
  function handleFile(file){
    if(!file)return;
    if(!file.name.match(/\.(csv|txt)$/i)){
      setImportMsg('Please upload a .csv file.');
      return;
    }
    setImporting(true);
    setImportMsg('');
    setImportRows(null);
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const rows=parseCSV(e.target.result);
        if(!rows||rows.length===0){
          setImportMsg('No data rows found. Make sure the file has a header row and data.');
          setImporting(false);
          return;
        }
        setImportRows(rows);
        setImportMsg('✓ Parsed '+rows.length+' row'+(rows.length!==1?'s':'')+
          ' — review below and click Import to add to your app.');
      }catch(err){
        setImportMsg('Parse error: '+err.message);
      }
      setImporting(false);
    };
    reader.onerror=()=>{setImportMsg('Could not read file.');setImporting(false);};
    reader.readAsText(file);
  }

  /* ── Drag & drop handlers ── */
  function onDragOver(e){
    e.preventDefault();   /* CRITICAL — stops browser opening the file */
    e.stopPropagation();
    setDragOver(true);
  }
  function onDragEnter(e){
    e.preventDefault();
    e.stopPropagation();
    setDragOver(true);
  }
  function onDragLeave(e){
    e.preventDefault();
    e.stopPropagation();
    setDragOver(false);
  }
  function onDrop(e){
    e.preventDefault();   /* CRITICAL — stops browser opening the file */
    e.stopPropagation();
    setDragOver(false);
    const file=e.dataTransfer.files[0];
    handleFile(file);
  }

  /* ── Do the actual import ── */
  function doImport(){
    if(!importRows||!importRows.length)return;
    if(importType==='inventory'&&setInventory){
      const newItems=importRows.map((r,i)=>{
        /* eBay report columns normalize to: itemnumber, title, customlabelsku,
           availablequantity, format, currency, startprice, currentprice,
           watchers, bids, startdate, enddate, ebaycategoryname, ebaycategorynumber,
           condition, ebayproductidepid, listingsite, pupc, pean, pisbn */
        const price=parseFloat(r.price||r.listprice||r.saleprice||r.currentprice||r.startprice||0)||0;
        const ebayCat=r.category||r.cat||r.ebaycategoryname||r.ebaycategoryname1||'';
        const platform=r.platform||(r.itemnumber||r.listingsite?'eBay':'-');
        return{
          id:Date.now()+i,
          sku:r.sku||r.stocknumber||r.customlabelsku||(skuPrefixForImport+String((skuNextForImport+i)).padStart(skuPadForImport,'0')),
          title:r.title||r.name||r.item||'Untitled',
          category:ebayCat,
          brand:r.brand||'',
          condition:r.condition||r.cond||'Good',
          qty:parseInt(r.qty||r.quantity||r.availablequantity||1)||1,
          cost:parseFloat(r.cost||r.purchasecost||0)||0,
          price:price,
          status:r.status||(r.itemnumber?'Listed':'Unlisted'),
          platform:platform,
          location:r.location||r.storagelocation||'',
          notes:r.notes||r.note||r.variationdetails||'',
          dateAdded:r.dateadded||new Date().toISOString().slice(0,10),
          daysListed:parseInt(r.dayslisted||0)||0,
          itemNumber:r.itemnumber||'',
          customSku:r.customlabelsku||'',
          format:r.format||'FIXED_PRICE',
          currency:r.currency||'USD',
          startPrice:r.startprice||'',
          currentPrice:r.currentprice||'',
          watchers:r.watchers||'',
          bids:r.bids||'',
          startDate:r.startdate||'',
          endDate:r.enddate||'',
          ebayCategory:r.ebaycategoryname||r.ebaycategoryname1||'',
          ebayCategoryId:r.ebaycategorynumber||r.ebaycategorynumber1||'',
          ebayProductId:r.ebayproductidepid||r.epid||'',
          listingSite:r.listingsite||'US',
          upc:r.pupc||r.upc||'',
          ean:r.pean||r.ean||'',
          isbn:r.pisbn||r.isbn||'',
        };
      });
      setInventory(prev=>[...prev,...newItems]);
      /* advance SKU counter if we auto-generated any */
      if(setBiz){
        const autoCount=importRows.filter(r=>!(r.sku||r.stocknumber||r.customlabelsku)).length;
        if(autoCount>0)setBiz(prev=>({...prev,skuNext:(prev.skuNext||1)+autoCount}));
      }
      setImportMsg('✅ Imported '+newItems.length+' items into your inventory!');
      setImportRows(null);
      setTimeout(()=>setImportMsg(''),5000);
    }
  }

  const EXPORTS=[
    {label:'Inventory CSV',sub:inventory.length+' items · SKUs, costs, prices, status',icon:'box',color:T.cyan,fn:exportInventory},
    {label:'Expenses CSV',sub:expenses.length+' records · categories & dates',icon:'receipt',color:T.warning,fn:exportExpenses},
    {label:'Mileage Log CSV',sub:mileage.length+' trips · IRS deduction amounts',icon:'car',color:T.success,fn:exportMileage},
  ];

  return(
    <div style={{padding:'24px 28px',overflowY:'auto',flex:1}}>
      <div style={{fontSize:26,fontWeight:800,color:T.text,letterSpacing:-0.5,marginBottom:20}}>
        Import / Export
      </div>

      {/* Tab switcher */}
      <div style={{display:'flex',gap:4,marginBottom:22,background:T.surface,borderRadius:14,
        padding:5,width:'fit-content',border:`1px solid ${T.border}`}}>
        {[['export','Export Data','download'],['import','Import Data','upload']].map(([id,lbl,ic])=>(
          <button key={id}
            onClick={()=>{setTab(id);setExportDone('');setImportMsg('');setImportRows(null);setDragOver(false);}}
            style={{background:tab===id?BRAND.yellow:'transparent',color:tab===id?'#111':T.muted,
              border:'none',borderRadius:10,padding:'9px 20px',fontSize:14,fontWeight:600,
              cursor:'pointer',fontFamily:"'Inter',sans-serif",transition:'all .14s',
              display:'inline-flex',alignItems:'center',gap:7}}>
            <Icon name={ic} size={15} color={tab===id?'#111':T.muted}/>{lbl}
          </button>
        ))}
      </div>

      {/* ═══ EXPORT TAB ═══ */}
      {tab==='export'&&(
        <div>
          {/* Summary */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:16}}>
            {[[inventory.length,'Inventory Items','box',T.cyan],
              [expenses.length,'Expense Records','receipt',T.warning],
              [mileage.length,'Mileage Trips','car',T.success]].map(([v,l,i,c])=>(
              <div key={l} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,
                padding:'16px 18px',display:'flex',alignItems:'center',gap:12,
                boxShadow:`0 1px 4px ${T.shadow}`}}>
                <div style={{width:40,height:40,borderRadius:10,background:c+'18',
                  display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <Icon name={i} size={20} color={c}/>
                </div>
                <div>
                  <div style={{fontSize:22,fontWeight:800,color:T.text}}>{v}</div>
                  <div style={{fontSize:12,color:T.muted}}>{l}</div>
                </div>
              </div>
            ))}
          </div>

          {/* Year selector */}
          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:18,
            padding:'18px 22px',marginBottom:16,boxShadow:`0 1px 4px ${T.shadow}`}}>
            <SectionLabel text="Select Year" T={T}/>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {[String(new Date().getFullYear()),String(new Date().getFullYear()-1),'All Time'].map(y=>(
                <button key={y} onClick={()=>setYear(y)} style={{
                  background:year===y?BRAND.yellow:T.surface,
                  color:year===y?'#111':T.muted,
                  border:`1px solid ${year===y?BRAND.yellow:T.border}`,
                  borderRadius:20,padding:'7px 16px',fontSize:13,fontWeight:600,
                  cursor:'pointer',fontFamily:"'Inter',sans-serif"}}>
                  {y}
                </button>
              ))}
            </div>
          </div>

          {/* Export buttons */}
          <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:14}}>
            {EXPORTS.map(({label,sub,icon,color,fn})=>(
              <div key={label} style={{background:T.card,border:`1px solid ${T.border}`,
                borderRadius:14,padding:'14px 18px',display:'flex',alignItems:'center',
                gap:14,boxShadow:`0 1px 3px ${T.shadow}`}}>
                <div style={{width:42,height:42,borderRadius:11,background:color+'18',
                  display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  <Icon name={icon} size={20} color={color}/>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:700,color:T.text}}>{label}</div>
                  <div style={{fontSize:12,color:T.muted,marginTop:2}}>{sub}</div>
                </div>
                <Btn small icon="download" variant="ghost" T={T} onClick={fn}>Download</Btn>
              </div>
            ))}
          </div>

          {exportDone&&(
            <div style={{background:T.success+'12',border:`1px solid ${T.success}28`,
              borderRadius:14,padding:'13px 18px',display:'flex',alignItems:'center',gap:10}}>
              <Icon name="checkCircle" size={18} color={T.success}/>
              <div style={{fontSize:14,fontWeight:600,color:T.success}}>{exportDone}</div>
            </div>
          )}

          <div style={{background:T.cyan+'0E',border:`1px solid ${T.cyan}28`,borderRadius:14,
            padding:'13px 18px',marginTop:12,display:'flex',alignItems:'center',gap:12}}>
            <Icon name="shield" size={18} color={T.cyan}/>
            <div style={{fontSize:13,color:T.text}}>
              Your data lives in this browser's IndexedDB. Export regularly as your backup.
            </div>
          </div>
        </div>
      )}

      {/* ═══ IMPORT TAB ═══ */}
      {tab==='import'&&(
        <div>
          {/* Import type selector */}
          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:16,
            padding:'16px 20px',marginBottom:14,boxShadow:`0 1px 4px ${T.shadow}`}}>
            <SectionLabel text="What are you importing?" T={T}/>
            <div style={{display:'flex',gap:8}}>
              {[['inventory','Inventory Items','box'],['expenses','Expenses','receipt'],['mileage','Mileage','car']].map(([id,lbl,ic])=>(
                <button key={id} onClick={()=>setImportType(id)} style={{
                  background:importType===id?BRAND.yellow:T.surface,
                  color:importType===id?'#111':T.muted,
                  border:`1px solid ${importType===id?BRAND.yellow:T.border}`,
                  borderRadius:10,padding:'8px 16px',fontSize:13,fontWeight:600,
                  cursor:'pointer',fontFamily:"'Inter',sans-serif",
                  display:'inline-flex',alignItems:'center',gap:7}}>
                  <Icon name={ic} size={15} color={importType===id?'#111':T.muted}/>{lbl}
                </button>
              ))}
            </div>
          </div>

          {/* Drag & Drop zone — fully wired */}
          <div
            onDragOver={onDragOver}
            onDragEnter={onDragEnter}
            onDragLeave={onDragLeave}
            onDrop={onDrop}
            onClick={()=>fileInputRef.current&&fileInputRef.current.click()}
            style={{
              border:`2px dashed ${dragOver?BRAND.yellow:T.border}`,
              borderRadius:18,
              padding:'40px 24px',
              textAlign:'center',
              marginBottom:16,
              background:dragOver?BRAND.yellow+'0A':T.card,
              cursor:'pointer',
              transition:'all .15s',
              boxShadow:`0 1px 4px ${T.shadow}`,
            }}>
            {/* Hidden file input */}
            <input
              ref={fileInputRef}
              type="file"
              accept=".csv,.txt"
              style={{display:'none'}}
              onChange={e=>handleFile(e.target.files[0])}
            />
            <div style={{marginBottom:12,display:'flex',justifyContent:'center'}}>
              <Icon name="upload" size={40} color={dragOver?BRAND.yellow:T.muted}
                style={{opacity:dragOver?1:.5}}/>
            </div>
            <div style={{fontSize:16,fontWeight:700,
              color:dragOver?BRAND.yellow:T.text,marginBottom:6}}>
              {dragOver?'Drop your CSV file here!':'Drag & Drop CSV File'}
            </div>
            <div style={{fontSize:13,color:T.muted,marginBottom:14}}>
              or click anywhere in this box to browse files
            </div>
            {importing&&(
              <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,fontSize:13,color:T.cyan}}>
                <Icon name="refresh" size={15} color={T.cyan} style={{animation:'spin 1s linear infinite'}}/>
                Reading file…
              </div>
            )}
          </div>

          {/* Status / error message */}
          {importMsg&&(
            <div style={{
              background:importMsg.startsWith('✓')||importMsg.startsWith('✅')?T.success+'12':T.danger+'12',
              border:`1px solid ${importMsg.startsWith('✓')||importMsg.startsWith('✅')?T.success:T.danger}28`,
              borderRadius:12,padding:'12px 16px',marginBottom:14,fontSize:14,fontWeight:600,
              color:importMsg.startsWith('✓')||importMsg.startsWith('✅')?T.success:T.danger,
              display:'flex',alignItems:'center',gap:10}}>
              <Icon name={importMsg.startsWith('✓')||importMsg.startsWith('✅')?'checkCircle':'alert'}
                size={18} color={importMsg.startsWith('✓')||importMsg.startsWith('✅')?T.success:T.danger}/>
              {importMsg}
            </div>
          )}

          {/* Preview table */}
          {importRows&&importRows.length>0&&(
            <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:16,
              padding:'16px 20px',marginBottom:14,boxShadow:`0 1px 4px ${T.shadow}`}}>
              <SectionLabel text={`Preview — ${importRows.length} rows detected`} T={T}/>
              <div style={{maxHeight:220,overflowY:'auto',marginBottom:14}}>
                {importRows.slice(0,8).map((row,i)=>(
                  <div key={i} style={{display:'flex',gap:10,padding:'8px 0',
                    borderBottom:`1px solid ${T.border}`,fontSize:13,flexWrap:'wrap'}}>
                    <span style={{fontWeight:600,color:T.text,flex:'0 0 auto',maxWidth:200,
                      overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      {row.title||row.name||row.description||'(row '+(i+1)+')'}
                    </span>
                    {row.brand&&<span style={{color:T.muted}}>· {row.brand}</span>}
                    {row.category&&<Badge text={row.category} color={T.cyan} T={T}/>}
                    {(row.price||row.cost)&&<span style={{color:T.success,marginLeft:'auto'}}>
                      ${row.price||row.cost}
                    </span>}
                  </div>
                ))}
                {importRows.length>8&&(
                  <div style={{fontSize:12,color:T.muted,padding:'8px 0'}}>
                    + {importRows.length-8} more rows…
                  </div>
                )}
              </div>
              <Btn icon="upload" T={T} style={{width:'100%'}} onClick={doImport}>
                Import {importRows.length} {importType==='inventory'?'Items':importType==='expenses'?'Expenses':'Trips'} Now
              </Btn>
            </div>
          )}

          {/* Column guide */}
          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:16,
            padding:'16px 20px',boxShadow:`0 1px 4px ${T.shadow}`}}>
            <SectionLabel text="Expected CSV Column Names" T={T}/>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
              {(importType==='inventory'
                ?[['title','Item title (required)'],['sku','SKU / stock number'],
                  ['category','Category'],['brand','Brand'],['cost','Purchase cost'],
                  ['price','Listing price'],['status','Unlisted/Listed/Sold'],
                  ['platform','eBay, Poshmark, etc'],['condition','New, Good, Fair…'],['location','Storage location']]
                :importType==='expenses'
                ?[['title','Description (required)'],['amount','Amount'],
                  ['category','Category'],['date','Date (YYYY-MM-DD)'],
                  ['recurring','Yes or No'],['notes','Notes']]
                :[['from','Starting location'],['to','Destination'],
                  ['miles','Miles driven'],['purpose','Sourcing, Shipping, etc'],
                  ['date','Date (YYYY-MM-DD)'],['deduction','Deduction amount']]
              ).map(([f,l])=>(
                <div key={f} style={{display:'flex',gap:8,alignItems:'center',
                  padding:'5px 0',borderBottom:`1px solid ${T.border}`}}>
                  <span style={{fontSize:12,background:T.surface,color:BRAND.magenta,
                    borderRadius:6,padding:'2px 8px',fontWeight:600,
                    minWidth:80,textAlign:'center',flexShrink:0}}>{f}</span>
                  <span style={{fontSize:12,color:T.muted}}>{l}</span>
                </div>
              ))}
            </div>
            <div style={{fontSize:12,color:T.muted,marginTop:12,lineHeight:1.6}}>
              Column names are case-insensitive. Extra columns are ignored.
              First row must be the header row.
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function SettingsPage({biz,setBiz,dark,setDark,T}){
  const [tab,setTab]=useState('business');
  const [saved,setSaved]=useState(false);
  const fileRef=React.useRef(null);

  function update(k,v){setBiz(prev=>({...prev,[k]:v}));}
  function save(){setSaved(true);setTimeout(()=>setSaved(false),2500);}

  function handleLogoUpload(e){
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>update('logo',ev.target.result);
    reader.readAsDataURL(file);
  }

  /* Reusable inline select — uses only existing T props */
  function Sel({label,value,onChange,options}){
    return(
      <div style={{marginBottom:14}}>
        {label&&<div style={{fontSize:12,fontWeight:600,color:T.muted,marginBottom:6}}>{label}</div>}
        <select
          value={value}
          onChange={e=>onChange(e.target.value)}
          style={{width:'100%',background:T.inputBg,border:`1.5px solid ${T.border}`,
            borderRadius:10,color:T.text,padding:'10px 14px',fontSize:14,
            fontFamily:"'Inter',sans-serif",outline:'none',cursor:'pointer'}}>
          {options.map(o=>(
            <option key={Array.isArray(o)?o[0]:o} value={Array.isArray(o)?o[0]:o}>
              {Array.isArray(o)?o[1]:o}
            </option>
          ))}
        </select>
      </div>
    );
  }

  /* Reusable textarea */
  function TextArea({label,value,onChange,rows=3,placeholder=''}){
    return(
      <div style={{marginBottom:14}}>
        {label&&<div style={{fontSize:12,fontWeight:600,color:T.muted,marginBottom:6}}>{label}</div>}
        <textarea
          rows={rows}
          value={value||''}
          onChange={e=>onChange(e.target.value)}
          placeholder={placeholder}

/* ═══════════════════════════════════════════════════════════
   INDEXEDDB PERSISTENCE LAYER
═══════════════════════════════════════════════════════════ */
const DB_NAME='retroReplayHub';
const DB_VER=1;

function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      ['inventory','expenses','mileage','goals'].forEach(s=>{
        if(!db.objectStoreNames.contains(s))
          db.createObjectStore(s,{keyPath:'id',autoIncrement:false});
      });
      if(!db.objectStoreNames.contains('settings'))
        db.createObjectStore('settings',{keyPath:'k'});
    };
    req.onsuccess=e=>res(e.target.result);
    req.onerror=e=>rej(e.target.error);
  });
}
function dbGetAll(store){
  return openDB().then(db=>new Promise((res,rej)=>{
    const req=db.transaction(store,'readonly').objectStore(store).getAll();
    req.onsuccess=()=>res(req.result||[]);
    req.onerror=e=>rej(e.target.error);
  }));
}
function dbSaveAll(store,arr){
  return openDB().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(store,'readwrite');
    const os=tx.objectStore(store);
    os.clear();
    arr.forEach(item=>os.put(item));
    tx.oncomplete=res;
    tx.onerror=e=>rej(e.target.error);
  }));
}
function dbGetSetting(k){
  return openDB().then(db=>new Promise((res,rej)=>{
    const req=db.transaction('settings','readonly').objectStore('settings').get(k);
    req.onsuccess=()=>res(req.result?req.result.v:undefined);
    req.onerror=e=>rej(e.target.error);
  }));
}
function dbPutSetting(k,v){
  return openDB().then(db=>new Promise((res,rej)=>{
    const req=db.transaction('settings','readwrite').objectStore('settings').put({k,v});
    req.onsuccess=res;
    req.onerror=e=>rej(e.target.error);
  }));
}

/* ═══════════════════════════════════════════════════════════
   BARCODE / UPC / ISBN LOOKUP
   Chains three free public APIs with no key required:
   1. Open Food Facts  — consumer products, food, electronics
   2. Open Library    — books by ISBN
   3. UPCitemdb       — general merchandise (free tier 100/day)
═══════════════════════════════════════════════════════════ */
async function lookupBarcode(code){
  const clean=code.replace(/\D/g,'');

  /* ── 1. Open Food Facts ── */
  try{
    const r=await fetch(`https://world.openfoodfacts.org/api/v0/product/${clean}.json`,{signal:AbortSignal.timeout(4000)});
    if(r.ok){
      const d=await r.json();
      if(d.status===1&&d.product&&d.product.product_name){
        const p=d.product;
        return{
          title:p.product_name||p.product_name_en||'',
          brand:p.brands||'',
          category:p.categories_tags?p.categories_tags[0]?.replace(/^en:/,'').replace(/-/g,' '):'',
          image:p.image_front_url||p.image_url||'',
          source:'Open Food Facts',
        };
      }
    }
  }catch{}

  /* ── 2. Open Library (ISBN) ── */
  if(clean.length===10||clean.length===13){
    try{
      const r=await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${clean}&format=json&jscmd=data`,{signal:AbortSignal.timeout(4000)});
      if(r.ok){
        const d=await r.json();
        const b=d[`ISBN:${clean}`];
        if(b&&b.title){
          return{
            title:b.title,
            brand:b.authors?b.authors.map(a=>a.name).join(', '):'',
            category:'Books',
            image:b.cover?b.cover.medium||b.cover.small||'':'',
            source:'Open Library',
          };
        }
      }
    }catch{}
  }

  /* ── 3. UPCitemdb (free trial — 100 req/day, no key needed) ── */
  try{
    const r=await fetch(`https://api.upcitemdb.com/prod/trial/lookup?upc=${clean}`,{signal:AbortSignal.timeout(5000)});
    if(r.ok){
      const d=await r.json();
      if(d.code==='OK'&&d.items?.length){
        const it=d.items[0];
        return{
          title:it.title||'',
          brand:it.brand||it.manufacturer||'',
          category:it.category||'',
          image:it.images?.length?it.images[0]:'',
          source:'UPCitemdb',
        };
      }
    }
  }catch{}

  return null; /* not found in any source */
}


function App(){
  const [darkState,setDarkState]=useState(true);
  const T=darkState?DARK:LIGHT;
  const [page,setPage]=useState('home');
  const [col,setCol]=useState(false);
  const [dbReady,setDbReady]=useState(false);
  const [inventory,setInventoryState]=useState([]);
  const [expenses,setExpensesState]=useState([]);
  const [mileage,setMileageState]=useState([]);
  const [goals,setGoalsState]=useState([]);
  const BIZ_DEFAULT={name:'Retro Replay Hub',tagline:'Games • Movies • Music • Fashion',ownerName:'',email:'',phone:'',address:'',city:'',state:'',zip:'',country:'US',website:'',taxId:'',logo:null,currency:'USD',mileageRate:0.59,timezone:'America/New_York',skuPrefix:'RRH-',skuNext:1,skuPad:4};
  const [biz,setBizState]=useState(BIZ_DEFAULT);

  /* ── Bootstrap: load everything from IndexedDB on first mount ── */
  useEffect(()=>{
    (async()=>{
      try{
        const[inv,exp,mil,gls,bizSaved,darkSaved]=await Promise.all([
          dbGetAll('inventory'),dbGetAll('expenses'),
          dbGetAll('mileage'),dbGetAll('goals'),
          dbGetSetting('biz'),dbGetSetting('dark'),
        ]);
        if(inv.length>0)setInventoryState(inv);
        if(exp.length>0)setExpensesState(exp);
        if(mil.length>0)setMileageState(mil);
        if(gls.length>0)setGoalsState(gls);
        if(bizSaved)setBizState({...BIZ_DEFAULT,...bizSaved});
        if(darkSaved!==undefined)setDarkState(darkSaved);
      }catch(err){console.warn('IndexedDB load failed, using empty state:',err);}
      setDbReady(true);
    })();
  },[]);

  /* ── Write-through setters: update React state + persist to DB ── */
  function setInventory(next){
    setInventoryState(prev=>{
      const arr=typeof next==='function'?next(prev):next;
      dbSaveAll('inventory',arr).catch(e=>console.warn(e));
      return arr;
    });
  }
  function setExpenses(next){
    setExpensesState(prev=>{
      const arr=typeof next==='function'?next(prev):next;
      dbSaveAll('expenses',arr).catch(e=>console.warn(e));
      return arr;
    });
  }
  function setMileage(next){
    setMileageState(prev=>{
      const arr=typeof next==='function'?next(prev):next;
      dbSaveAll('mileage',arr).catch(e=>console.warn(e));
      return arr;
    });
  }
  function setGoals(next){
    setGoalsState(prev=>{
      const arr=typeof next==='function'?next(prev):next;
      dbSaveAll('goals',arr).catch(e=>console.warn(e));
      return arr;
    });
  }
  function setBiz(next){
    setBizState(prev=>{
      const val=typeof next==='function'?next(prev):next;
      dbPutSetting('biz',val).catch(e=>console.warn(e));
      return val;
    });
  }
  function setDark(v){
    setDarkState(v);
    dbPutSetting('dark',v).catch(()=>{});
  }

  useEffect(()=>{
    document.body.style.background=T.bg;
    document.body.style.color=T.text;
    const st=document.getElementById('scrollStyle');
    if(st)st.textContent=`*::-webkit-scrollbar-thumb{background:${T.scrollThumb}!important}`;
  },[darkState,T]);

  /* ── Loading screen while IndexedDB bootstraps ── */
  if(!dbReady){
    return(
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',background:DARK.bg,gap:18}}>
        <LogoSVG size={56}/>
        <div style={{fontSize:13,color:DARK.muted,fontFamily:"'Inter',sans-serif"}}>Loading your data…</div>
        <div style={{width:200,height:3,background:DARK.surface,borderRadius:10,overflow:'hidden'}}>
          <div style={{width:'60%',height:'100%',background:BRAND.yellow,borderRadius:10,animation:'loadBar 1.2s ease-in-out infinite alternate'}}/>
        </div>
        <style></style>
      </div>
    );
  }

  const nav=NAV_ITEMS.find(n=>n.id===page)||NAV_ITEMS[0];

  const PAGES={
    home:<HomePage inventory={inventory} expenses={expenses} mileage={mileage} goals={goals} T={T} onNav={setPage}/>,
    inventory:<InventoryPage inventory={inventory} setInventory={setInventory} biz={biz} setBiz={setBiz} T={T} lookupBarcode={lookupBarcode}/>,
    profit:<ProfitPage T={T}/>,
    expenses:<ExpensesPage expenses={expenses} setExpenses={setExpenses} T={T}/>,
    mileage:<MileagePage mileage={mileage} setMileage={setMileage} T={T}/>,
    reports:<ReportsPage inventory={inventory} expenses={expenses} T={T}/>,
    goals:<GoalsPage goals={goals} setGoals={setGoals} T={T}/>,
    storage:<StoragePage inventory={inventory} T={T}/>,
    labels:<LabelsPage inventory={inventory} T={T}/>,
    export:<ExportPage inventory={inventory} setInventory={setInventory} expenses={expenses} mileage={mileage} biz={biz} setBiz={setBiz} T={T}/>,
    settings:<SettingsPage biz={biz} setBiz={setBiz} dark={darkState} setDark={setDark} T={T}/>,
  };

  return(
    <div style={{display:'flex',height:'100vh',background:T.bg,color:T.text,overflow:'hidden',transition:'background 0.2s,color 0.2s'}}>
      <style id="scrollStyle">{`*::-webkit-scrollbar-thumb{background:${T.scrollThumb}!important}`}</style>
      <Sidebar active={page} onNav={setPage} col={col} setCol={setCol} T={T} dark={darkState} setDark={setDark} biz={biz}/>

      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* Top bar */}
        <div style={{height:58,borderBottom:`1px solid ${T.border}`,display:'flex',alignItems:'center',
          justifyContent:'space-between',padding:'0 28px',background:T.topbar,flexShrink:0,
          boxShadow:`0 1px 4px ${T.shadow}`}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <Icon name={nav.icon} size={17} color={T.muted}/>
            <span style={{fontSize:14,fontWeight:600,color:T.text}}>{nav.label}</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <div style={{width:7,height:7,borderRadius:'50%',background:T.success}}/>
              <span style={{fontSize:12,color:T.muted,fontWeight:500}}>Live</span>
            </div>
            <div style={{width:1,height:20,background:T.border}}/>
            <button onClick={()=>setPage('settings')} title="Settings" style={{background:'none',border:'none',cursor:'pointer',padding:3,lineHeight:0,borderRadius:8}}>
              <Icon name="settings" size={17} color={T.muted}/>
            </button>
            <div onClick={()=>setPage('settings')} style={{width:32,height:32,borderRadius:10,background:biz&&biz.logo?'transparent':`linear-gradient(135deg,${BRAND.yellow},${BRAND.magenta})`,display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',cursor:'pointer',flexShrink:0}}>
              {biz&&biz.logo?<img src={biz.logo} alt="logo" style={{width:'100%',height:'100%',objectFit:'cover'}}/>:<span style={{fontSize:14,fontWeight:900,color:'#111',fontFamily:"'Inter',sans-serif"}}>{biz&&biz.name?biz.name.charAt(0).toUpperCase():'R'}</span>}
            </div>
          </div>
        </div>

        {PAGES[page]}
        {/* ── GLOBAL FOOTER BAR ── */}
        <div style={{background:T.card,borderTop:`1px solid ${T.border}`,padding:'7px 28px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
          <div style={{fontSize:11,color:T.muted}}>
            Made with ♥ by{' '}
            <a href="https://retroreplayhub.com" target="_blank" rel="noopener noreferrer" style={{color:BRAND.yellow,textDecoration:'none',fontWeight:600}}>RetroReplayHub.com</a>
            {' '}· Free reseller tool · No support SLA · Updates released as available
          </div>
          <div style={{display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
            <a href="https://github.com/DaPandulce/Reseller-Central" target="_blank" rel="noopener noreferrer" style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:T.muted,textDecoration:'none'}}>
              <Icon name="github" size={13} color={T.muted}/>GitHub
            </a>
            <span style={{fontSize:11,color:T.muted,cursor:'pointer'}} onClick={()=>setPage('settings')}>v1.0.0</span>
          </div>
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
