<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;font-family:'Inter',sans-serif}
body{transition:background 0.2s,color 0.2s}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{border-radius:10px}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input:-webkit-autofill{transition:background-color 9999s ease-in-out 0s}
button{font-family:'Inter',sans-serif}
input,select{font-family:'Inter',sans-serif}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes loadBar{from{width:15%}to{width:85%}}
.pe{animation:fadeIn .18s ease}
</style>
</head>

/* ── LOGO SVG ─────────────────────────────────────────────── */
function LogoSVG({size=40}){
  return(
    <svg width={size*3.2} height={size} viewBox="0 0 320 100" style={{display:'block'}}>
      {/* Play button arrow shape — dashed magenta outline */}
      <polygon points="160,5 255,5 255,0 300,50 255,100 255,95 160,95"
        fill="none" stroke={BRAND.magenta} strokeWidth="3.5" strokeDasharray="7,3.5"/>
      {/* Cyan inner stroke */}
      <polygon points="162,9 251,9 251,4 293,50 251,96 251,91 162,91"
        fill="none" stroke={BRAND.cyan} strokeWidth="1.8"/>
      {/* "RESELLER CENTRAL" logo text */}
      <text x="8" y="44" style={{fontFamily:"'Press Start 2P',monospace",fontSize:'13px',fontWeight:'bold',fill:BRAND.yellow,
        paintOrder:'stroke',stroke:'#1a1a1a',strokeWidth:'4',strokeLinejoin:'round'}}>RETRO</text>
      <text x="8" y="70" style={{fontFamily:"'Press Start 2P',monospace",fontSize:'13px',fontWeight:'bold',fill:BRAND.yellow,
        paintOrder:'stroke',stroke:'#1a1a1a',strokeWidth:'4',strokeLinejoin:'round'}}>REPLAY</text>
      {/* Cyan offset for 3-D effect */}
      <text x="6" y="42" style={{fontFamily:"'Press Start 2P',monospace",fontSize:'13px',fontWeight:'bold',fill:BRAND.cyan,opacity:0.5}}>RETRO</text>
      <text x="6" y="68" style={{fontFamily:"'Press Start 2P',monospace",fontSize:'13px',fontWeight:'bold',fill:BRAND.cyan,opacity:0.5}}>REPLAY</text>
      {/* Magenta shadow */}
      <text x="10" y="46" style={{fontFamily:"'Press Start 2P',monospace",fontSize:'13px',fontWeight:'bold',fill:BRAND.magenta,opacity:0.4}}>RETRO</text>
      <text x="10" y="72" style={{fontFamily:"'Press Start 2P',monospace",fontSize:'13px',fontWeight:'bold',fill:BRAND.magenta,opacity:0.4}}>REPLAY</text>
      {/* HUB in cyan */}
      <text x="90" y="89" style={{fontFamily:"'Press Start 2P',monospace",fontSize:'11px',fill:BRAND.cyan,
        paintOrder:'stroke',stroke:'#1a1a1a',strokeWidth:'2.5',strokeLinejoin:'round'}}>·RC·</text>
      <text x="88" y="87" style={{fontFamily:"'Press Start 2P',monospace",fontSize:'11px',fill:BRAND.cyan,opacity:0.4}}>·RC·</text>
    </svg>
  );
}

function Btn(props){
  /* Accept both full names (variant/small/disabled/icon) and shorthands (v/sm/dis/ic/full) */
  const {
    children, onClick,
    variant, v,
    small, sm,
    disabled, dis,
    icon, ic,
    full,
    T,
    style: extraStyle={},
  } = props;
  const vari  = variant || v || 'primary';
  const isSmall = small || sm || false;
  const isDis   = disabled || dis || false;
  const iconName= icon || ic;

  const base={
    borderRadius:10, fontWeight:600,
    cursor:isDis?'not-allowed':'pointer',
    opacity:isDis?0.5:1,
    transition:'opacity 0.15s',
    display:'inline-flex', alignItems:'center', justifyContent:'center',
    gap:6, border:'none',
    fontFamily:"'Inter',sans-serif",
    width: full?'100%':'auto',
    ...extraStyle,
  };
  const sz = isSmall
    ? {padding:'6px 13px', fontSize:13}
    : {padding:'10px 20px', fontSize:14};

  const C = T||{};
  const palette={
    primary: {...base,...sz, background:BRAND.yellow,  color:'#111', fontWeight:700},
    secondary:{...base,...sz, background:'transparent', color:C.cyan||BRAND.cyan,
               border:`1.5px solid ${C.cyan||BRAND.cyan}`},
    ghost:   {...base,...sz, background:C.surface||'#f2f2f7', color:C.muted||'#666',
               border:`1px solid ${C.border||'#e5e5ea'}`},
    danger:  {...base,...sz, background:'rgba(255,69,58,0.1)', color:'#FF453A',
               border:'1px solid rgba(255,69,58,0.3)'},
    sec:     {...base,...sz, background:'transparent', color:C.cyan||BRAND.cyan,
               border:`1.5px solid ${C.cyan||BRAND.cyan}`},
  };
  const st = palette[vari] || palette.primary;
  const iconColor = (vari==='primary') ? '#111' : (st.color||'#111');

  return(
    <button
      onClick={onClick}
      disabled={isDis}
      style={st}
      onMouseEnter={e=>{ if(!isDis) e.currentTarget.style.opacity='0.82'; }}
      onMouseLeave={e=>{ e.currentTarget.style.opacity='1'; }}
    >
      {iconName && <Icon name={iconName} size={isSmall?14:16} color={iconColor}/>}
      {children}
    </button>
  );
}

function InventoryPage({inventory,setInventory,biz,setBiz,T,lookupBarcode}){
  const [filterStatus,setFilterStatus]=useState('All');
  const [search,setSearch]=useState('');
  const [showAdd,setShowAdd]=useState(false);
  const [showScan,setShowScan]=useState(false);
  const [showSku,setShowSku]=useState(false);
  const [viewItem,setViewItem]=useState(null);
  const [editItem,setEditItem]=useState(null);

  /* Scan / barcode state */
  const [scanCode,setScanCode]=useState('');
  const [scanResult,setScanResult]=useState(null);
  const [scanLoading,setScanLoading]=useState(false);
  const [scanError,setScanError]=useState('');

  /* SKU sequence settings (persisted in biz) */
  const skuPrefix=(biz&&biz.skuPrefix!==undefined)?biz.skuPrefix:'RRH-';
  const skuNext=(biz&&biz.skuNext!==undefined)?biz.skuNext:1;
  const skuPad=(biz&&biz.skuPad!==undefined)?biz.skuPad:4;
  const [skuDraft,setSkuDraft]=useState({prefix:skuPrefix,next:String(skuNext),pad:String(skuPad)});
  function nextSku(){
    return skuPrefix+String(skuNext).padStart(skuPad,'0');
  }
  function bumpSku(){
    if(setBiz)setBiz(prev=>({...prev,skuNext:(prev.skuNext||1)+1}));
  }
  function saveSkuSettings(){
    if(setBiz)setBiz(prev=>({...prev,
      skuPrefix:skuDraft.prefix,
      skuNext:parseInt(skuDraft.next)||1,
      skuPad:parseInt(skuDraft.pad)||4,
    }));
    setShowSku(false);
  }

  async function doLookup(){
    const code=scanCode.trim();
    if(!code)return;
    setScanLoading(true);setScanError('');setScanResult(null);
    try{
      const r=await lookupBarcode(code);
      if(r){setScanResult({...r,upc:code});}
      else{setScanError('Product not found in any database. Try adding manually.');}
    }catch(e){
      setScanError('Lookup failed — check your internet connection.');
    }
    setScanLoading(false);
  }

  function closeScan(){
    setShowScan(false);setScanCode('');setScanResult(null);setScanError('');
  }

  /* Full item schema incl. eBay report fields */
  const blankItem={title:'',category:'',brand:'',condition:'Good',qty:'1',
    cost:'',price:'',status:'Unlisted',platform:'-',location:'',notes:'',
    itemNumber:'',customSku:'',format:'FIXED_PRICE',currency:'USD',startPrice:'',
    currentPrice:'',watchers:'',bids:'',startDate:'',endDate:'',
    ebayCategory:'',ebayCategoryId:'',upc:'',ean:'',isbn:'',ebayProductId:'',listingSite:'US'};
  const [ni,setNi]=useState(blankItem);

  function openAddFromScan(r){
    setNi(prev=>({...prev, title:r.title||'', brand:r.brand||'', category:r.category||'',
      upc:r.upc||'', isbn:r.isbn||''}));
    closeScan();
    setShowAdd(true);
  }

  function addItem(){
    if(!ni.title.trim())return;
    const id=Date.now();
    const sku=nextSku();
    const item={...ni,id,sku,
      qty:parseInt(ni.qty)||1,
      cost:parseFloat(ni.cost)||0,
      price:parseFloat(ni.price)||0,
      daysListed:0,
      dateAdded:new Date().toISOString().slice(0,10)
    };
    setInventory(prev=>[...prev,item]);
    bumpSku();
    setNi(blankItem);
    setShowAdd(false);
  }

  /* EDIT existing item */
  function startEdit(item){
    setEditItem({...blankItem,...item,
      qty:String(item.qty||1),
      cost:String(item.cost||''),
      price:String(item.price||''),
    });
    setViewItem(null);
  }
  function saveEdit(){
    if(!editItem.title.trim())return;
    const updated={...editItem,
      qty:parseInt(editItem.qty)||1,
      cost:parseFloat(editItem.cost)||0,
      price:parseFloat(editItem.price)||0,
    };
    setInventory(prev=>prev.map(i=>i.id===updated.id?updated:i));
    setEditItem(null);
  }

  const statuses=['All','Unlisted','Listed','Sold','Returned','Archived'];
  const statusColor={Listed:T.cyan,Sold:T.success,Unlisted:T.warning,Returned:T.danger,Archived:T.muted};
  const catEmoji=c=>c==='Video Games'?'🎮':c==='Electronics'?'📱':c==='Clothing'?'👕':c==='Books'?'📚':c==='DVDs & Blu-ray Discs'?'📀':'📦';

  const filtered=inventory.filter(i=>{
    const matchStatus=filterStatus==='All'||i.status===filterStatus;
    const q=search.toLowerCase();
    const matchSearch=!q||(i.title||'').toLowerCase().includes(q)||(i.sku||'').toLowerCase().includes(q)||(i.brand||'').toLowerCase().includes(q)||(i.upc||'').includes(q);
    return matchStatus&&matchSearch;
  });

  const invValue=inventory.reduce((s,i)=>s+(parseFloat(i.cost)||0),0);
  const potProfit=inventory.reduce((s,i)=>s+(parseFloat(i.price)||0)-(parseFloat(i.cost)||0),0);

  /* Shared form-fields renderer for both Add and Edit modals */
  function ItemForm({data,set}){
    const selStyle={background:T.inputBg,border:`1.5px solid ${T.border}`,borderRadius:10,color:T.text,
      padding:'10px 14px',fontSize:14,width:'100%',fontFamily:"'Inter',sans-serif",outline:'none'};
    const lblStyle={fontSize:12,fontWeight:600,color:T.muted,marginBottom:6};
    return(
      <div>
        <div style={{fontSize:11,fontWeight:700,color:BRAND.yellow,letterSpacing:.8,textTransform:'uppercase',marginBottom:12}}>Core Details</div>
        <Field label="Title *" value={data.title} onChange={v=>set({...data,title:v})} T={T}/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <Field label="Category" value={data.category} onChange={v=>set({...data,category:v})} T={T}/>
          <Field label="Brand" value={data.brand} onChange={v=>set({...data,brand:v})} T={T}/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 80px',gap:12}}>
          <Field label="Cost" value={data.cost} onChange={v=>set({...data,cost:v})} type="number" prefix="$" T={T}/>
          <Field label="List Price" value={data.price} onChange={v=>set({...data,price:v})} type="number" prefix="$" T={T}/>
          <Field label="Qty" value={data.qty} onChange={v=>set({...data,qty:v})} type="number" T={T}/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div style={{marginBottom:14}}>
            <div style={lblStyle}>Condition</div>
            <select value={data.condition} onChange={e=>set({...data,condition:e.target.value})} style={selStyle}>
              {['New','Like New','Very Good','Good','Acceptable','Fair','Poor','For parts'].map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <div style={{marginBottom:14}}>
            <div style={lblStyle}>Status</div>
            <select value={data.status} onChange={e=>set({...data,status:e.target.value})} style={selStyle}>
              {['Unlisted','Listed','Sold','Returned','Archived'].map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div style={{marginBottom:14}}>
            <div style={lblStyle}>Platform</div>
            <select value={data.platform} onChange={e=>set({...data,platform:e.target.value})} style={selStyle}>
              {['-','eBay','Poshmark','Mercari','Etsy','FB Marketplace','Whatnot','Amazon','Depop'].map(p=><option key={p}>{p}</option>)}
            </select>
          </div>
          <Field label="Storage Location" value={data.location} onChange={v=>set({...data,location:v})} T={T}/>
        </div>

        <div style={{fontSize:11,fontWeight:700,color:BRAND.yellow,letterSpacing:.8,textTransform:'uppercase',margin:'8px 0 12px'}}>eBay / Listing Fields</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <Field label="Item Number" value={data.itemNumber} onChange={v=>set({...data,itemNumber:v})} T={T}/>
          <Field label="Custom Label (SKU)" value={data.customSku} onChange={v=>set({...data,customSku:v})} T={T}/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <div style={{marginBottom:14}}>
            <div style={lblStyle}>Format</div>
            <select value={data.format} onChange={e=>set({...data,format:e.target.value})} style={selStyle}>
              {['FIXED_PRICE','AUCTION','STORE_INVENTORY'].map(f=><option key={f}>{f}</option>)}
            </select>
          </div>
          <div style={{marginBottom:14}}>
            <div style={lblStyle}>Currency</div>
            <select value={data.currency} onChange={e=>set({...data,currency:e.target.value})} style={selStyle}>
              {['USD','EUR','GBP','CAD','AUD'].map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <Field label="Start Price" value={data.startPrice} onChange={v=>set({...data,startPrice:v})} type="number" prefix="$" T={T}/>
          <Field label="Current Price" value={data.currentPrice} onChange={v=>set({...data,currentPrice:v})} type="number" prefix="$" T={T}/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <Field label="Watchers" value={data.watchers} onChange={v=>set({...data,watchers:v})} type="number" T={T}/>
          <Field label="Bids" value={data.bids} onChange={v=>set({...data,bids:v})} type="number" T={T}/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <Field label="Start Date" value={data.startDate} onChange={v=>set({...data,startDate:v})} T={T}/>
          <Field label="End Date" value={data.endDate} onChange={v=>set({...data,endDate:v})} T={T}/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <Field label="eBay Category" value={data.ebayCategory} onChange={v=>set({...data,ebayCategory:v})} T={T}/>
          <Field label="eBay Category #" value={data.ebayCategoryId} onChange={v=>set({...data,ebayCategoryId:v})} T={T}/>
        </div>
        <Field label="eBay Product ID (ePID)" value={data.ebayProductId} onChange={v=>set({...data,ebayProductId:v})} T={T}/>

        <div style={{fontSize:11,fontWeight:700,color:BRAND.yellow,letterSpacing:.8,textTransform:'uppercase',margin:'8px 0 12px'}}>Product Identifiers</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
          <Field label="UPC" value={data.upc} onChange={v=>set({...data,upc:v})} T={T}/>
          <Field label="EAN" value={data.ean} onChange={v=>set({...data,ean:v})} T={T}/>
          <Field label="ISBN" value={data.isbn} onChange={v=>set({...data,isbn:v})} T={T}/>
        </div>

        <Field label="Notes" value={data.notes} onChange={v=>set({...data,notes:v})} T={T}/>
        {data.cost&&data.price&&(
          <div style={{background:T.success+'12',border:`1px solid ${T.success}28`,borderRadius:10,
            padding:'10px 14px',marginBottom:14,fontSize:13,color:T.success,fontWeight:600}}>
            Estimated Profit: ${(parseFloat(data.price||0)-parseFloat(data.cost||0)).toFixed(2)} ·
            ROI: {parseFloat(data.cost)>0?Math.round(((parseFloat(data.price)-parseFloat(data.cost))/parseFloat(data.cost))*100):0}%
          </div>
        )}
      </div>
    );
  }

  return(
    <div style={{padding:'24px 28px',overflowY:'auto',flex:1}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div style={{fontSize:26,fontWeight:800,color:T.text,letterSpacing:-0.5}}>Inventory</div>
        <div style={{display:'flex',gap:8}}>
          <Btn onClick={()=>{setSkuDraft({prefix:skuPrefix,next:String(skuNext),pad:String(skuPad)});setShowSku(true);}} icon="tag" variant="ghost" T={T}>SKU: {nextSku()}</Btn>
          <Btn onClick={()=>setShowScan(true)} icon="scan" variant="ghost" T={T}>Scan Barcode</Btn>
          <Btn onClick={()=>setShowAdd(true)} icon="plus" T={T}>Add Item</Btn>
        </div>
      </div>

      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(110px,1fr))',gap:10,marginBottom:16}}>
        <StatCard label="Total" value={inventory.length} accent={T.cyan} icon="box" T={T}/>
        <StatCard label="Listed" value={inventory.filter(i=>i.status==='Listed').length} accent={BRAND.yellow} icon="tag" T={T}/>
        <StatCard label="Sold" value={inventory.filter(i=>i.status==='Sold').length} accent={T.success} icon="check" T={T}/>
        <StatCard label="Unlisted" value={inventory.filter(i=>i.status==='Unlisted').length} accent={T.warning} icon="alert" T={T}/>
        <StatCard label="Value" value={`$${invValue.toFixed(0)}`} accent={BRAND.magenta} icon="dollar" T={T}/>
        <StatCard label="Pot. Profit" value={`$${potProfit.toFixed(0)}`} accent={T.success} icon="trendUp" T={T}/>
      </div>

      {/* Search + filter */}
      <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
        <div style={{flex:1,minWidth:200,display:'flex',alignItems:'center',background:T.inputBg,
          border:`1.5px solid ${T.border}`,borderRadius:12,padding:'0 14px',gap:8}}>
          <Icon name="search" size={15} color={T.muted}/>
          <input value={search} onChange={e=>setSearch(e.target.value)}
            placeholder="Search title, brand, SKU, UPC…"
            style={{background:'transparent',border:'none',outline:'none',color:T.text,
              padding:'10px 0',fontSize:14,width:'100%',fontFamily:"'Inter',sans-serif"}}/>
          {search&&<button onClick={()=>setSearch('')} style={{background:'none',border:'none',
            cursor:'pointer',padding:2,lineHeight:0}}>
            <Icon name="x" size={14} color={T.muted}/>
          </button>}
        </div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {statuses.map(s=>(
            <button key={s} onClick={()=>setFilterStatus(s)} style={{
              background:filterStatus===s?BRAND.yellow:T.surface,
              color:filterStatus===s?'#111':T.muted,
              border:`1px solid ${filterStatus===s?BRAND.yellow:T.border}`,
              borderRadius:20,padding:'7px 14px',fontSize:13,fontWeight:600,
              cursor:'pointer',fontFamily:"'Inter',sans-serif",transition:'all .14s'
            }}>{s}</button>
          ))}
        </div>
      </div>

      {/* Item list */}
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {filtered.length===0&&(
          <div style={{textAlign:'center',padding:'56px 24px',color:T.muted}}>
            <Icon name="box" size={48} color={T.muted} style={{opacity:.3}}/>
            <div style={{fontSize:15,fontWeight:700,color:T.text,marginTop:14}}>
              {inventory.length===0?'No inventory yet':'No items match your search'}
            </div>
            <div style={{fontSize:13,marginTop:4,marginBottom:20}}>
              {inventory.length===0?'Add your first item or scan a barcode to get started':'Try a different filter or search term'}
            </div>
            {inventory.length===0&&(
              <div style={{display:'flex',gap:10,justifyContent:'center'}}>
                <Btn onClick={()=>setShowScan(true)} icon="scan" variant="ghost" T={T}>Scan Barcode</Btn>
                <Btn onClick={()=>setShowAdd(true)} icon="plus" T={T}>Add Manually</Btn>
              </div>
            )}
          </div>
        )}
        {filtered.map(item=>(
          <div key={item.id}
            style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,
              padding:'13px 17px',display:'flex',alignItems:'center',gap:14,
              boxShadow:`0 1px 3px ${T.shadow}`,transition:'border-color .14s'}}>
            <div onClick={()=>setViewItem(item)} style={{display:'flex',alignItems:'center',gap:14,flex:1,minWidth:0,cursor:'pointer'}}>
              <div style={{width:46,height:46,borderRadius:12,background:T.surface,flexShrink:0,
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>
                {catEmoji(item.category)}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:600,color:T.text,whiteSpace:'nowrap',
                  overflow:'hidden',textOverflow:'ellipsis',marginBottom:3}}>{item.title}</div>
                <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                  {item.sku&&<Badge text={item.sku} color={BRAND.magenta} T={T}/>}
                  <span style={{fontSize:12,color:T.muted}}>{item.category||'Uncategorized'}</span>
                  {item.location&&<span style={{fontSize:12,color:T.subtleMuted}}>· {item.location}</span>}
                </div>
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                <div style={{fontSize:15,fontWeight:700,color:T.text}}>${(parseFloat(item.price)||0).toFixed(2)}</div>
                <Badge text={item.status||'Unlisted'} color={statusColor[item.status]||T.muted} T={T}/>
              </div>
            </div>
            <button onClick={()=>startEdit(item)} title="Edit item"
              style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:9,padding:8,
                cursor:'pointer',lineHeight:0,flexShrink:0}}>
              <Icon name="edit" size={15} color={T.muted}/>
            </button>
          </div>
        ))}
      </div>

      {/* ── SKU SEQUENCE MODAL ── */}
      <Modal show={showSku} onClose={()=>setShowSku(false)} title="SKU Sequence Settings" width={440} T={T}>
        <div style={{fontSize:13,color:T.muted,marginBottom:18}}>
          Customize how new SKUs are generated. The next item will be assigned the SKU shown below.
        </div>
        <Field label="SKU Prefix" value={skuDraft.prefix} onChange={v=>setSkuDraft({...skuDraft,prefix:v})} T={T}/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          <Field label="Next Number" value={skuDraft.next} onChange={v=>setSkuDraft({...skuDraft,next:v})} type="number" T={T}/>
          <Field label="Zero Padding" value={skuDraft.pad} onChange={v=>setSkuDraft({...skuDraft,pad:v})} type="number" T={T}/>
        </div>
        <div style={{background:T.surface,borderRadius:10,padding:'14px 16px',marginBottom:16,
          display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{fontSize:12,color:T.muted,fontWeight:600,textTransform:'uppercase'}}>Preview</span>
          <span style={{fontSize:18,fontWeight:800,color:BRAND.yellow,fontFamily:'monospace'}}>
            {(skuDraft.prefix||'')+String(parseInt(skuDraft.next)||1).padStart(parseInt(skuDraft.pad)||0,'0')}
          </span>
        </div>
        <div style={{display:'flex',gap:10}}>
          <Btn variant="ghost" onClick={()=>setShowSku(false)} T={T}>Cancel</Btn>
          <Btn onClick={saveSkuSettings} T={T} style={{flex:1}}>Save SKU Settings</Btn>
        </div>
      </Modal>

      {/* ── BARCODE SCAN MODAL ── */}
      <Modal show={showScan} onClose={closeScan} title="Scan / Lookup Barcode" width={480} T={T}>
        <div style={{display:'flex',gap:10,marginBottom:16}}>
          <input
            autoFocus
            value={scanCode}
            onChange={e=>setScanCode(e.target.value)}
            onKeyDown={e=>{ if(e.key==='Enter') doLookup(); }}
            placeholder="Scan or type UPC / ISBN / EAN…"
            style={{flex:1,background:T.inputBg,border:`1.5px solid ${T.border}`,borderRadius:10,
              color:T.text,padding:'11px 14px',fontSize:14,outline:'none',fontFamily:"'Inter',sans-serif"}}/>
          <Btn onClick={doLookup} disabled={scanLoading} T={T}>{scanLoading?'…':'Look Up'}</Btn>
        </div>
        {scanLoading&&(
          <div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',fontSize:13,color:T.muted}}>
            <Icon name="refresh" size={15} color={T.cyan} style={{animation:'spin 1s linear infinite'}}/>
            Searching product databases…
          </div>
        )}
        {scanError&&(
          <div style={{background:T.danger+'12',border:`1px solid ${T.danger}28`,borderRadius:10,
            padding:'12px 14px',fontSize:13,color:T.danger,marginBottom:8}}>{scanError}</div>
        )}
        {scanResult&&(
          <div style={{background:T.surface,borderRadius:12,padding:16,marginBottom:8}}>
            <div style={{display:'flex',gap:14}}>
              {scanResult.image&&<img src={scanResult.image} alt="" style={{width:64,height:64,objectFit:'contain',borderRadius:8,flexShrink:0}}/>}
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:700,color:T.text,marginBottom:4}}>{scanResult.title||'Unknown product'}</div>
                {scanResult.brand&&<div style={{fontSize:13,color:T.muted}}>Brand: {scanResult.brand}</div>}
                {scanResult.category&&<div style={{fontSize:13,color:T.muted}}>Category: {scanResult.category}</div>}
                <div style={{fontSize:11,color:T.subtleMuted,marginTop:4}}>via {scanResult.source}</div>
              </div>
            </div>
            <Btn onClick={()=>openAddFromScan(scanResult)} T={T} style={{width:'100%',marginTop:14}}>
              Use This → Add to Inventory
            </Btn>
          </div>
        )}
        <div style={{fontSize:12,color:T.subtleMuted,marginTop:8}}>
          Tip: a USB barcode scanner types the code in automatically — just press Enter.
        </div>
      </Modal>

      {/* ── ADD ITEM MODAL ── */}
      <Modal show={showAdd} onClose={()=>{setShowAdd(false);setNi(blankItem);}} title="Add Inventory Item" width={560} T={T}>
        <div style={{background:BRAND.yellow+'14',border:`1px solid ${BRAND.yellow}40`,borderRadius:10,
          padding:'10px 14px',marginBottom:16,fontSize:13,color:T.text,display:'flex',
          alignItems:'center',justifyContent:'space-between'}}>
          <span>This item will be assigned SKU:</span>
          <span style={{fontWeight:800,fontFamily:'monospace',color:BRAND.yellow}}>{nextSku()}</span>
        </div>
        <ItemForm data={ni} set={setNi}/>
        <div style={{display:'flex',gap:10,marginTop:4}}>
          <Btn variant="ghost" onClick={()=>{setShowAdd(false);setNi(blankItem);}} T={T}>Cancel</Btn>
          <Btn onClick={addItem} T={T} style={{flex:1}}>Save Item</Btn>
        </div>
      </Modal>

      {/* ── EDIT ITEM MODAL ── */}
      {editItem&&(
        <Modal show={!!editItem} onClose={()=>setEditItem(null)} title="Edit Inventory Item" width={560} T={T}>
          <div style={{background:T.surface,borderRadius:10,padding:'10px 14px',marginBottom:16,
            fontSize:13,color:T.muted,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span>Editing SKU:</span>
            <span style={{fontWeight:800,fontFamily:'monospace',color:BRAND.magenta}}>{editItem.sku||'(none)'}</span>
          </div>
          <Field label="SKU" value={editItem.sku||''} onChange={v=>setEditItem({...editItem,sku:v})} T={T}/>
          <ItemForm data={editItem} set={setEditItem}/>
          <div style={{display:'flex',gap:10,marginTop:4}}>
            <Btn variant="danger" icon="trash" T={T} onClick={()=>{
              if(window.confirm('Delete this item permanently?')){
                setInventory(prev=>prev.filter(i=>i.id!==editItem.id));
                setEditItem(null);
              }
            }}>Delete</Btn>
            <Btn variant="ghost" onClick={()=>setEditItem(null)} T={T}>Cancel</Btn>
            <Btn onClick={saveEdit} T={T} style={{flex:1}}>Save Changes</Btn>
          </div>
        </Modal>
      )}

      {/* ── ITEM DETAIL MODAL ── */}
      {viewItem&&(
        <Modal show={!!viewItem} onClose={()=>setViewItem(null)} title="Item Details" width={560} T={T}>
          <div style={{display:'flex',gap:16,marginBottom:20,alignItems:'center'}}>
            <div style={{width:56,height:56,borderRadius:14,background:T.surface,
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,flexShrink:0}}>
              {catEmoji(viewItem.category)}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:16,fontWeight:700,color:T.text,marginBottom:6}}>{viewItem.title}</div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                {viewItem.sku&&<Badge text={viewItem.sku} color={BRAND.magenta} T={T}/>}
                <Badge text={viewItem.status||'Unlisted'} color={statusColor[viewItem.status]||T.muted} T={T}/>
                {viewItem.platform&&viewItem.platform!=='-'&&<Badge text={viewItem.platform} color={T.cyan} T={T}/>}
              </div>
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}>
            {[
              ['Cost',`$${(parseFloat(viewItem.cost)||0).toFixed(2)}`],
              ['List Price',`$${(parseFloat(viewItem.price)||0).toFixed(2)}`],
              ['Profit',`$${((parseFloat(viewItem.price)||0)-(parseFloat(viewItem.cost)||0)).toFixed(2)}`],
              ['ROI',viewItem.cost>0?Math.round(((viewItem.price-viewItem.cost)/viewItem.cost)*100)+'%':'—'],
              ['Condition',viewItem.condition||'—'],
              ['Brand',viewItem.brand||'—'],
              ['Location',viewItem.location||'—'],
              ['Qty',viewItem.qty||1],
              ['Item Number',viewItem.itemNumber||'—'],
              ['UPC',viewItem.upc||'—'],
              ['eBay Category',viewItem.ebayCategory||'—'],
              ['Watchers',viewItem.watchers||'—'],
            ].map(([l,v])=>(
              <div key={l} style={{background:T.surface,borderRadius:10,padding:'10px 14px'}}>
                <div style={{fontSize:11,color:T.muted,fontWeight:600,marginBottom:3,textTransform:'uppercase'}}>{l}</div>
                <div style={{fontSize:14,fontWeight:700,color:T.text,wordBreak:'break-word'}}>{v}</div>
              </div>
            ))}
          </div>
          {viewItem.notes&&(
            <div style={{background:T.surface,borderRadius:10,padding:'10px 14px',marginBottom:14}}>
              <div style={{fontSize:11,color:T.muted,fontWeight:600,marginBottom:4,textTransform:'uppercase'}}>Notes</div>
              <div style={{fontSize:13,color:T.text}}>{viewItem.notes}</div>
            </div>
          )}
          <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
            <Btn variant="ghost" small T={T} onClick={()=>setViewItem(null)}>Close</Btn>
            <Btn icon="edit" small T={T} onClick={()=>startEdit(viewItem)}>Edit Item</Btn>
            <Btn variant="danger" small icon="trash" T={T} onClick={()=>{
              setInventory(prev=>prev.filter(i=>i.id!==viewItem.id));
              setViewItem(null);
            }}>Delete</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

function ExpensesPage({expenses,setExpenses,T}){
  const [showAdd,setShowAdd]=useState(false);
  const [filterCat,setFilterCat]=useState('All');
  const today=new Date().toISOString().split('T')[0];
  const thisMonthKey=today.slice(0,7); // e.g. "2026-06"
  const lastMonthKey=(()=>{const d=new Date();d.setMonth(d.getMonth()-1);return d.toISOString().slice(0,7);})();
  const blank={title:'',category:'Shipping Supplies',amount:'',date:today,recurring:false,notes:''};
  const [ne,setNe]=useState(blank);

  const cats=['Shipping Supplies','Inventory Purchase','Software','Transportation','Equipment','Advertising','Other'];
  const total      = expenses.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
  const thisMonth  = expenses.filter(e=>e.date&&e.date.startsWith(thisMonthKey)).reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
  const lastMonth  = expenses.filter(e=>e.date&&e.date.startsWith(lastMonthKey)).reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
  const filtered   = filterCat==='All' ? expenses : expenses.filter(e=>e.category===filterCat);
  const bd = cats.map(c=>({
    cat:c,
    total:expenses.filter(e=>e.category===c).reduce((s,e)=>s+(parseFloat(e.amount)||0),0)
  })).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);

  function addExp(){
    if(!ne.title.trim()||!ne.amount)return;
    const item={...ne,id:Date.now(),amount:parseFloat(ne.amount)||0};
    setExpenses(prev=>[...prev,item]);
    setNe(blank);
    setShowAdd(false);
  }

  return(
    <div style={{padding:'24px 28px',overflowY:'auto',flex:1}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div style={{fontSize:26,fontWeight:800,color:T.text,letterSpacing:-0.5}}>Expenses</div>
        <Btn onClick={()=>setShowAdd(true)} icon="plus" T={T}>Add Expense</Btn>
      </div>

      {/* KPI cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(120px,1fr))',gap:10,marginBottom:18}}>
        <StatCard label="Total YTD"   value={`$${total.toFixed(2)}`}     accent={T.danger}  icon="receipt"  T={T}/>
        <StatCard label="This Month"  value={`$${thisMonth.toFixed(2)}`} accent={T.warning} icon="barchart" T={T}/>
        <StatCard label="Last Month"  value={`$${lastMonth.toFixed(2)}`} accent={T.muted}   icon="calendar" T={T}/>
        <StatCard label="Entries"     value={expenses.length}             accent={T.cyan}    icon="info"     T={T}/>
      </div>

      {/* Category breakdown */}
      {bd.length>0&&(
        <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:18,padding:22,marginBottom:16,boxShadow:`0 1px 4px ${T.shadow}`}}>
          <SectionLabel text="Category Breakdown" T={T}/>
          {bd.map(c=>(
            <div key={c.cat} style={{marginBottom:12}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
                <span style={{fontSize:14,color:T.text,fontWeight:500}}>{c.cat}</span>
                <span style={{fontSize:14,fontWeight:700,color:T.text}}>${c.total.toFixed(2)}</span>
              </div>
              <ProgressBar pct={total>0?(c.total/total)*100:0} color={BRAND.yellow} T={T}/>
            </div>
          ))}
        </div>
      )}

      {/* Filter chips */}
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12}}>
        {['All',...cats].map(c=>(
          <button key={c} onClick={()=>setFilterCat(c)} style={{
            background:filterCat===c?BRAND.yellow:T.surface,
            color:filterCat===c?'#111':T.muted,
            border:`1px solid ${filterCat===c?BRAND.yellow:T.border}`,
            borderRadius:20,padding:'5px 13px',fontSize:12,fontWeight:600,
            cursor:'pointer',fontFamily:"'Inter',sans-serif",transition:'all .14s'
          }}>{c}</button>
        ))}
      </div>

      {/* Expense list */}
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {filtered.length===0&&(
          <div style={{textAlign:'center',padding:'48px 24px',color:T.muted}}>
            <Icon name="receipt" size={44} color={T.muted} style={{opacity:.3}}/>
            <div style={{fontSize:15,fontWeight:700,color:T.text,marginTop:14}}>No expenses yet</div>
            <div style={{fontSize:13,marginTop:4}}>Click "Add Expense" to start tracking</div>
          </div>
        )}
        {filtered.map(exp=>(
          <div key={exp.id} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,
            padding:'13px 17px',display:'flex',alignItems:'center',gap:14,boxShadow:`0 1px 3px ${T.shadow}`}}>
            <div style={{width:40,height:40,borderRadius:11,background:T.warning+'18',
              display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <Icon name="receipt" size={18} color={T.warning}/>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14,fontWeight:600,color:T.text}}>{exp.title}</div>
              <div style={{fontSize:12,color:T.muted,marginTop:1}}>{exp.category} · {exp.date}</div>
              {exp.notes&&<div style={{fontSize:11,color:T.muted,marginTop:1,opacity:.7}}>{exp.notes}</div>}
            </div>
            <div style={{textAlign:'right',flexShrink:0}}>
              <div style={{fontSize:15,fontWeight:800,color:T.text}}>${(parseFloat(exp.amount)||0).toFixed(2)}</div>
              {exp.recurring&&<Badge text="Recurring" color={T.cyan} T={T}/>}
            </div>
          </div>
        ))}
      </div>

      {/* Add Expense Modal */}
      <Modal show={showAdd} onClose={()=>{setShowAdd(false);setNe(blank);}} title="Add Expense" width={440} T={T}>
        <Field label="Description" value={ne.title} onChange={v=>setNe({...ne,title:v})} T={T}/>
        <Field label="Amount" value={ne.amount} onChange={v=>setNe({...ne,amount:v})} type="number" prefix="$" T={T}/>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:600,color:T.muted,marginBottom:6}}>Category</div>
          <select value={ne.category} onChange={e=>setNe({...ne,category:e.target.value})}
            style={{background:T.inputBg,border:`1.5px solid ${T.border}`,borderRadius:10,color:T.text,
              padding:'10px 14px',fontSize:14,width:'100%',fontFamily:"'Inter',sans-serif",outline:'none'}}>
            {cats.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
        <Field label="Date" value={ne.date} onChange={v=>setNe({...ne,date:v})} type="date" T={T}/>
        <Field label="Notes (optional)" value={ne.notes||''} onChange={v=>setNe({...ne,notes:v})} T={T}/>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16,padding:'10px 0',borderTop:`1px solid ${T.border}`,marginTop:4}}>
          <input type="checkbox" id="exp-recur" checked={!!ne.recurring}
            onChange={e=>setNe({...ne,recurring:e.target.checked})}
            style={{width:16,height:16,accentColor:BRAND.yellow,cursor:'pointer'}}/>
          <label htmlFor="exp-recur" style={{fontSize:14,color:T.text,cursor:'pointer'}}>
            Recurring monthly expense
          </label>
        </div>
        <div style={{display:'flex',gap:10}}>
          <Btn variant="ghost" onClick={()=>{setShowAdd(false);setNe(blank);}} T={T}>Cancel</Btn>
          <Btn onClick={addExp} T={T} style={{flex:1}}>Save Expense</Btn>
        </div>
      </Modal>
    </div>
  );
}

/* ── PROFIT CALCULATOR ──────────────────────────────────────── */
function ProfitPage({T}){
  const FEES={
    'eBay':0.1315,'Poshmark':0.20,'Mercari':0.10,
    'Etsy':0.065,'FB Marketplace':0.0,'Whatnot':0.08,
    'Amazon':0.15,'Depop':0.10,'Craigslist':0.0,
  };
  const platforms=Object.keys(FEES);

  const [plat,setPlat]=useState('eBay');
  const [cost,setCost]=useState('');
  const [price,setPrice]=useState('');
  const [ship,setShip]=useState('');
  const [pack,setPack]=useState('');
  const [tax,setTax]=useState('');

  const sp=parseFloat(price)||0;
  const ic=parseFloat(cost)||0;
  const sc=parseFloat(ship)||0;
  const pc=parseFloat(pack)||0;
  const tx=parseFloat(tax)||0;
  const feeRate=FEES[plat]||0;
  const fee=sp*feeRate;
  const net=sp-ic-sc-pc-fee-tx;
  const roi=ic>0?(net/ic)*100:0;
  const margin=sp>0?(net/sp)*100:0;
  const breakEven=ic+sc+pc+fee+tx;
  const stars=roi>=100?5:roi>=75?4:roi>=50?3:roi>=25?2:roi>0?1:0;

  const best=platforms.reduce((b,p)=>{
    const n=sp-ic-sc-pc-sp*(FEES[p]||0)-tx;
    return n>b.profit?{p,profit:n}:b;
  },{p:plat,profit:net});

  const rows=[
    ['Gross Revenue',`$${sp.toFixed(2)}`,T.text],
    [`${plat} Fee (${(feeRate*100).toFixed(1)}%)`,`-$${fee.toFixed(2)}`,T.danger],
    ['Shipping Cost',`-$${sc.toFixed(2)}`,T.danger],
    ['Packaging',`-$${pc.toFixed(2)}`,T.danger],
    ['Sales Tax',`-$${tx.toFixed(2)}`,T.danger],
    ['Item Cost',`-$${ic.toFixed(2)}`,T.danger],
  ];

  return(
    <div style={{padding:'24px 28px',overflowY:'auto',flex:1}}>
      <div style={{fontSize:26,fontWeight:800,color:T.text,letterSpacing:-0.5,marginBottom:22}}>
        Profit Calculator
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:20}}>

        {/* ── Result panel ── */}
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:20,
            padding:28,textAlign:'center',boxShadow:`0 2px 8px ${T.shadow}`}}>
            {/* Star rating */}
            <div style={{display:'flex',justifyContent:'center',gap:4,marginBottom:16}}>
              {[1,2,3,4,5].map(s=>(
                <svg key={s} width={24} height={24} viewBox="0 0 24 24"
                  fill={s<=stars?BRAND.yellow:'none'}
                  stroke={s<=stars?BRAND.yellow:T.muted}
                  strokeWidth={1.5}>
                  <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26 12,2"/>
                </svg>
              ))}
            </div>

            <div style={{fontSize:11,fontWeight:700,color:T.muted,letterSpacing:0.8,
              textTransform:'uppercase',marginBottom:8}}>Net Profit</div>
            <div style={{fontSize:54,fontWeight:900,letterSpacing:-2,lineHeight:1,
              color:net>0?T.success:net<0?T.danger:T.muted}}>
              {net>=0?'$':'-$'}{Math.abs(net).toFixed(2)}
            </div>
            {sp>0&&<div style={{fontSize:13,color:T.muted,marginTop:8}}>
              Platform fee: <b style={{color:T.text}}>${fee.toFixed(2)}</b>
            </div>}

            {/* KPI pills */}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,
              marginTop:20,paddingTop:20,borderTop:`1px solid ${T.border}`}}>
              {[
                ['Margin',isFinite(margin)?margin.toFixed(1)+'%':'—',BRAND.yellow],
                ['ROI',isFinite(roi)?roi.toFixed(1)+'%':'—',T.cyan],
                ['Platform',plat,BRAND.magenta],
              ].map(([l,v,col])=>(
                <div key={l} style={{background:T.surface,borderRadius:12,padding:'10px 6px'}}>
                  <div style={{fontSize:10,color:T.muted,fontWeight:700,
                    textTransform:'uppercase',letterSpacing:0.4,marginBottom:4}}>{l}</div>
                  <div style={{fontSize:14,fontWeight:800,color:col,wordBreak:'break-word'}}>{v}</div>
                </div>
              ))}
            </div>

            {/* Better platform tip */}
            {best.p!==plat&&sp>0&&best.profit>net&&(
              <div onClick={()=>setPlat(best.p)}
                style={{marginTop:14,background:T.cyan+'12',border:`1px solid ${T.cyan}28`,
                  borderRadius:12,padding:'12px 16px',display:'flex',alignItems:'center',
                  gap:10,textAlign:'left',cursor:'pointer'}}>
                <Icon name="bulb" size={18} color={T.cyan}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:T.muted}}>Better platform available</div>
                  <div style={{fontSize:13,fontWeight:700,color:T.cyan}}>
                    Switch to {best.p}
                    <span style={{color:T.success}}> +${(best.profit-net).toFixed(2)}</span>
                  </div>
                </div>
              </div>
            )}
          </div>

          {/* Break-even analysis */}
          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:18,
            padding:'18px 20px',boxShadow:`0 1px 4px ${T.shadow}`}}>
            <SectionLabel text="Price Analysis" T={T}/>
            {[
              ['Break-Even Price',`$${breakEven.toFixed(2)}`,T.warning],
              ['Quick Sale (-20%)',sp>0?`$${(sp*0.8).toFixed(2)}`:'—',T.muted],
              ['Market Price',sp>0?`$${sp.toFixed(2)}`:'—',T.cyan],
              ['Premium (+15%)',sp>0?`$${(sp*1.15).toFixed(2)}`:'—',T.success],
            ].map(([l,v,col])=>(
              <div key={l} style={{display:'flex',justifyContent:'space-between',
                padding:'9px 0',borderBottom:`1px solid ${T.border}`}}>
                <span style={{fontSize:13,color:T.muted}}>{l}</span>
                <span style={{fontSize:14,fontWeight:700,color:col}}>{v}</span>
              </div>
            ))}
          </div>
        </div>

        {/* ── Input panel ── */}
        <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:20,
          padding:24,boxShadow:`0 2px 8px ${T.shadow}`}}>

          <SectionLabel text="Select Platform" T={T}/>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:22}}>
            {platforms.map(p=>(
              <button key={p} onClick={()=>setPlat(p)} style={{
                background:plat===p?BRAND.yellow:T.surface,
                color:plat===p?'#111':T.muted,
                border:`1px solid ${plat===p?BRAND.yellow:T.border}`,
                borderRadius:20,padding:'6px 13px',fontSize:13,fontWeight:600,
                cursor:'pointer',fontFamily:"'Inter',sans-serif",transition:'all .14s',
              }}>{p}</button>
            ))}
          </div>

          <Field label="Item Cost (what you paid)" value={cost} onChange={setCost} type="number" prefix="$" T={T}/>
          <Field label="Sale Price (what you'll sell for)" value={price} onChange={setPrice} type="number" prefix="$" T={T}/>
          <Field label="Shipping Cost" value={ship} onChange={setShip} type="number" prefix="$" T={T}/>
          <Field label="Packaging Cost" value={pack} onChange={setPack} type="number" prefix="$" T={T}/>
          <Field label="Sales Tax (if applicable)" value={tax} onChange={setTax} type="number" prefix="$" T={T}/>

          {/* Fee breakdown */}
          <div style={{background:T.surface,borderRadius:14,padding:'16px 18px',marginTop:4}}>
            <SectionLabel text="Fee Breakdown" T={T}/>
            {rows.map(([l,v,col])=>(
              <div key={l} style={{display:'flex',justifyContent:'space-between',
                padding:'5px 0',fontSize:13}}>
                <span style={{color:T.muted}}>{l}</span>
                <span style={{color:col,fontWeight:500}}>{v}</span>
              </div>
            ))}
            <div style={{display:'flex',justifyContent:'space-between',
              padding:'10px 0 0',borderTop:`1px solid ${T.border}`,marginTop:6}}>
              <span style={{fontSize:14,fontWeight:700,color:T.text}}>Net Profit</span>
              <span style={{fontSize:15,fontWeight:900,
                color:net>0?T.success:net<0?T.danger:T.muted}}>
                {net>=0?'$':'-$'}{Math.abs(net).toFixed(2)}
              </span>
            </div>
          </div>

          {/* Reset */}
          <button onClick={()=>{setCost('');setPrice('');setShip('');setPack('');setTax('');}}
            style={{marginTop:14,background:'none',border:`1px solid ${T.border}`,
              borderRadius:10,padding:'8px 16px',fontSize:13,color:T.muted,
              cursor:'pointer',fontFamily:"'Inter',sans-serif",width:'100%'}}>
            Clear Calculator
          </button>
        </div>
      </div>
    </div>
  );
}

        </div>
      </Modal>
    </div>
  );
}

/* ── REPORTS ────────────────────────────────────────────────── */
function ReportsPage({inventory,expenses,T}){
  const [period,setPeriod]=useState('Monthly');
  const sold=inventory.filter(i=>i.status==='Sold');
  const gross=sold.reduce((s,i)=>s+i.price,0);
  const cogs=sold.reduce((s,i)=>s+i.cost,0);
  const fees=sold.reduce((s,i)=>s+i.price*0.1315,0);
  const expT=expenses.reduce((s,e)=>s+e.amount,0);
  const net=gross-cogs-fees;
  const catPerf=[...new Set(sold.map(i=>i.category))].map(cat=>({cat,count:sold.filter(i=>i.category===cat).length,rev:sold.filter(i=>i.category===cat).reduce((s,i)=>s+i.price,0)})).sort((a,b)=>b.rev-a.rev);
  const platPerf=[...new Set(sold.map(i=>i.platform))].map(p=>({p,count:sold.filter(i=>i.platform===p).length,rev:sold.filter(i=>i.platform===p).reduce((s,i)=>s+i.price,0)})).sort((a,b)=>b.rev-a.rev);
  const pCols=[T.cyan,BRAND.magenta,BRAND.yellow,T.success,T.warning];

  return(
    <div style={{padding:'24px 28px',overflowY:'auto',flex:1}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:10}}>
        <div style={{fontSize:26,fontWeight:800,color:T.text,letterSpacing:-0.5}}>Reports</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {['Daily','Weekly','Monthly','YTD'].map(p=>(
            <button key={p} onClick={()=>setPeriod(p)} style={{background:period===p?BRAND.yellow:T.surface,
              color:period===p?'#111':T.muted,border:`1px solid ${period===p?BRAND.yellow:T.border}`,
              borderRadius:20,padding:'7px 14px',fontSize:13,fontWeight:600,cursor:'pointer',
              fontFamily:"'Inter',sans-serif",transition:'all 0.15s'}}>{p}</button>
          ))}
        </div>
      </div>

      {/* P&L */}

              <div style={{fontSize:13,marginTop:4}}>Head to the Available tab to accept a challenge!</div>

              <div style={{display:'flex',justifyContent:'space-between',marginTop:8,fontSize:13}}>
                <span style={{color:T.muted}}>{goal.current} of {goal.target} {goal.unit}</span>
                <span style={{color:tc[goal.type],fontWeight:700}}>{Math.round((goal.current/goal.target)*100)}%</span>

      {tab==='Available'&&(
        <div style={{display:'flex',flexDirection:'column',gap:12}}>

                  display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <Icon name="trendUp" size={18} color={tc[g.type]||BRAND.yellow}/>
                </div>
                <Badge text={g.type} color={tc[g.type]||BRAND.yellow} T={T}/>
              </div>
              <div style={{fontSize:17,fontWeight:700,color:T.text,marginBottom:4}}>{g.title}</div>
              <div style={{fontSize:13,color:T.muted,marginBottom:16}}>{g.description}</div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}>
                <div style={{background:T.surface,borderRadius:10,padding:12}}>
                  <div style={{fontSize:11,color:T.muted,fontWeight:600,marginBottom:4}}>TARGET</div>
                  <div style={{fontSize:19,fontWeight:800,color:T.text}}>{g.target}</div>

                <div style={{background:T.surface,borderRadius:10,padding:12}}>

              <div style={{display:'flex',gap:10}}>
                <Btn variant="ghost" small T={T}>Not Now</Btn>

                  Accept Challenge

          <Icon name="trophy" size={52} color={T.subtleMuted}/>
          <div style={{marginTop:16,fontSize:16,fontWeight:700}}>No completed goals yet</div>

  );
}
