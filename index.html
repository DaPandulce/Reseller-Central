/* ── SHARED UI ──────────────────────────────────────────────── */
function StatCard({label,value,sub,accent,icon,T}){
  return(
    <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:16,padding:'16px 18px',flex:1,minWidth:120,
      boxShadow:`0 1px 4px ${T.shadow}`}}>
      <div style={{width:36,height:36,borderRadius:10,background:accent+'18',display:'flex',alignItems:'center',
        justifyContent:'center',marginBottom:10}}>
        <Icon name={icon} size={18} color={accent}/>
      </div>
      <div style={{fontSize:22,fontWeight:800,color:T.text,letterSpacing:-0.5}}>{value}</div>
      <div style={{fontSize:12,fontWeight:500,color:T.muted,marginTop:2}}>{label}</div>
      {sub&&<div style={{fontSize:11,color:T.muted,marginTop:1}}>{sub}</div>}
    </div>
  );
}

function Badge({text,color,T}){
  return(
    <span style={{background:color+'1A',color,border:`1px solid ${color}30`,borderRadius:20,
      padding:'3px 10px',fontSize:11,fontWeight:600,display:'inline-block',whiteSpace:'nowrap'}}>
      {text}
    </span>
  );
}

function Btn({children,onClick,variant='primary',small=false,disabled=false,icon,T}){
  const base={borderRadius:10,fontWeight:600,cursor:disabled?'not-allowed':'pointer',
    opacity:disabled?0.5:1,transition:'all 0.15s',display:'inline-flex',alignItems:'center',
    justifyContent:'center',gap:6,border:'none',fontFamily:"'Inter',sans-serif"};
  const sz=small?{padding:'7px 14px',fontSize:13}:{padding:'10px 20px',fontSize:14};
  const variants={
    primary:{...base,...sz,background:BRAND.yellow,color:'#111',fontWeight:700},
    secondary:{...base,...sz,background:'transparent',color:T?T.cyan||BRAND.cyan:BRAND.cyan,
      border:`1.5px solid ${T?T.cyan||BRAND.cyan:BRAND.cyan}`},
    ghost:{...base,...sz,background:T?T.surface:'#f2f2f7',color:T?T.muted:'#666',
      border:`1px solid ${T?T.border:'#e5e5ea'}`},
    danger:{...base,...sz,background:'#FF453A18',color:'#FF453A',border:'1px solid #FF453A30'},
  };
  return(
    <button onClick={onClick} disabled={disabled} style={variants[variant]||variants.primary}>
      {icon&&<Icon name={icon} size={small?14:16} color={variants[variant]?.color||'#111'}/>}
      {children}
    </button>
  );
}

function Field({label,value,onChange,type='text',prefix,T}){
  return(
    <div style={{marginBottom:14}}>
      {label&&<div style={{fontSize:12,fontWeight:600,color:T.muted,marginBottom:6,letterSpacing:0.3}}>{label}</div>}
      <div style={{display:'flex',alignItems:'center',background:T.inputBg,border:`1.5px solid ${T.border}`,
        borderRadius:10,overflow:'hidden',transition:'border-color 0.15s'}}>
        {prefix&&<span style={{padding:'0 12px',color:T.muted,fontSize:14,fontWeight:500,flexShrink:0}}>{prefix}</span>}
        <input type={type} value={value} onChange={e=>onChange(e.target.value)}
          style={{background:'transparent',border:'none',outline:'none',color:T.text,
            padding:'10px 14px',fontSize:14,width:'100%',fontFamily:"'Inter',sans-serif"}}/>
      </div>
    </div>
  );
}

function ProgressBar({pct,color,T}){
  return(
    <div style={{background:T.surface,borderRadius:20,height:7,overflow:'hidden'}}>
      <div style={{width:`${Math.min(pct,100)}%`,height:'100%',background:color,borderRadius:20,transition:'width 0.5s ease'}}/>
    </div>
  );
}

function Modal({show,onClose,title,children,width=480,T}){

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',
      justifyContent:'center',zIndex:300,backdropFilter:'blur(4px)'}} onClick={onClose}>

        width,maxHeight:'88vh',overflowY:'auto',boxShadow:`0 20px 60px rgba(0,0,0,0.3)`}} onClick={e=>e.stopPropagation()}>

}

function InventoryPage({inventory,setInventory,T}){

    const id=inventory.length+1;
    setInventory([...inventory,{...ni,id,sku:`RC-${String(id).padStart(3,'0')}`,cost:parseFloat(ni.cost)||0,price:parseFloat(ni.price)||0,qty:parseInt(ni.qty)||1,daysListed:0}]);

        </div>
      </Modal>
    </div>
  );
}

/* ── PROFIT CALCULATOR ──────────────────────────────────────── */
function ProfitPage({T}){
  const [cost,setCost]=useState('25.00');
  const [price,setPrice]=useState('64.00');
  const [ship,setShip]=useState('5.99');
  const [pack,setPack]=useState('1.50');

  const fees={eBay:0.1315,Poshmark:0.20,Mercari:0.10,Etsy:0.065,'FB Marketplace':0.0,Whatnot:0.08};
  const platforms=Object.keys(fees);
  const sp=parseFloat(price)||0,ic=parseFloat(cost)||0,sc=parseFloat(ship)||0,pc=parseFloat(pack)||0;
  const fee=sp*(fees[platform]||0),net=sp-ic-sc-pc-fee;
  const roi=ic>0?(net/ic)*100:0,margin=sp>0?(net/sp)*100:0,be=ic+sc+pc+fee;
  const stars=roi>=80?4:roi>=50?3:roi>=20?2:1;
  const best=platforms.reduce((b,p)=>{const n=sp-ic-sc-pc-sp*fees[p];return n>b.profit?{platform:p,profit:n}:b},{platform,profit:net});

  return(
    <div style={{padding:'24px 28px',overflowY:'auto',flex:1}}>
      <div style={{fontSize:26,fontWeight:800,color:T.text,letterSpacing:-0.5,marginBottom:22}}>Profit Calculator</div>

              {[1,2,3,4,5].map(s=><Icon key={s} name="star" size={22} color={s<=stars?BRAND.yellow:T.border}

            </div>
            <div style={{fontSize:12,fontWeight:600,color:T.muted,marginBottom:4,letterSpacing:0.5,textTransform:'uppercase'}}>Net Profit</div>
            <div style={{fontSize:50,fontWeight:900,color:net>=0?T.success:T.danger,letterSpacing:-2}}>
              {net>=0?'$':'-$'}{Math.abs(net).toFixed(2)}
            </div>
            <div style={{fontSize:13,color:T.muted,marginTop:6}}>Platform fee: <b style={{color:T.text}}>${fee.toFixed(2)}</b></div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginTop:18,paddingTop:18,borderTop:`1px solid ${T.border}`}}>
              {[['Margin',margin.toFixed(1)+'%',BRAND.yellow],['ROI',roi.toFixed(1)+'%',T.cyan],['Platform',platform,BRAND.magenta]].map(([l,v,col])=>(
                <div key={l}><div style={{fontSize:11,color:T.muted,fontWeight:600,textTransform:'uppercase',letterSpacing:0.4}}>{l}</div>

/* ── EXPENSES ───────────────────────────────────────────────── */
function ExpensesPage({expenses,setExpenses,T}){
  const [showAdd,setShowAdd]=useState(false);
  const today=new Date().toISOString().split('T')[0];
  const blank={title:'',category:'Shipping Supplies',amount:'',date:today};
  const [ne,setNe]=useState(blank);
  const cats=['Shipping Supplies','Inventory Purchase','Software','Transportation','Equipment','Other'];
  const total=expenses.reduce((s,e)=>s+e.amount,0);
  const thisMonth=expenses.filter(e=>e.date.startsWith('2026-06')).reduce((s,e)=>s+e.amount,0);
  const bd=cats.map(c=>({cat:c,total:expenses.filter(e=>e.category===c).reduce((s,e)=>s+e.amount,0)})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);
  function addExp(){setExpenses([...expenses,{...ne,id:expenses.length+1,amount:parseFloat(ne.amount)||0}]);setNe(blank);setShowAdd(false);}

  return(
    <div style={{padding:'24px 28px',overflowY:'auto',flex:1}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div style={{fontSize:26,fontWeight:800,color:T.text,letterSpacing:-0.5}}>Expenses</div>
        <Btn onClick={()=>setShowAdd(true)} icon="plus" T={T}>Add Expense</Btn>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(120px,1fr))',gap:10,marginBottom:18}}>
        <StatCard label="Total YTD" value={`$${total.toFixed(2)}`} accent={T.danger} icon="receipt" T={T}/>
        <StatCard label="This Month" value={`$${thisMonth.toFixed(2)}`} accent={T.warning} icon="barchart" T={T}/>
        <StatCard label="Entries" value={expenses.length} accent={T.cyan} icon="info" T={T}/>
      </div>
      <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:18,padding:22,
        marginBottom:16,boxShadow:`0 1px 4px ${T.shadow}`}}>
        <SectionLabel text="Category Breakdown" T={T}/>
        {bd.map(c=>(
          <div key={c.cat} style={{marginBottom:14}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
              <span style={{fontSize:14,color:T.text,fontWeight:500}}>{c.cat}</span>
              <span style={{fontSize:14,fontWeight:700,color:T.text}}>${c.total.toFixed(2)}</span>
            </div>
            <ProgressBar pct={(c.total/total)*100} color={BRAND.yellow} T={T}/>
          </div>
        ))}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {expenses.map(exp=>(
          <div key={exp.id} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,
            padding:'14px 18px',display:'flex',alignItems:'center',gap:14,boxShadow:`0 1px 3px ${T.shadow}`}}>
            <div style={{width:40,height:40,borderRadius:11,background:T.warning+'18',display:'flex',
              alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <Icon name="receipt" size={18} color={T.warning}/>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:14,fontWeight:600,color:T.text}}>{exp.title}</div>
              <div style={{fontSize:12,color:T.muted,marginTop:1}}>{exp.category} · {exp.date}</div>
            </div>
            <div style={{textAlign:'right',flexShrink:0}}>
              <div style={{fontSize:15,fontWeight:800,color:T.text}}>${exp.amount.toFixed(2)}</div>
              {exp.recurring&&<Badge text="Recurring" color={T.cyan} T={T}/>}
            </div>
          </div>
        ))}
      </div>
      <Modal show={showAdd} onClose={()=>setShowAdd(false)} title="Add Expense" width={420} T={T}>
        <Field label="Description" value={ne.title} onChange={v=>setNe({...ne,title:v})} T={T}/>
        <Field label="Amount" value={ne.amount} onChange={v=>setNe({...ne,amount:v})} type="number" prefix="$" T={T}/>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:600,color:T.muted,marginBottom:6}}>Category</div>

              padding:'10px 14px',fontSize:14,width:'100%',fontFamily:"'Inter',sans-serif",outline:'none'}}>
            {cats.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
        <Field label="Date" value={ne.date} onChange={v=>setNe({...ne,date:v})} type="date" T={T}/>
        <div style={{display:'flex',gap:10,marginTop:8}}>
          <Btn variant="ghost" onClick={()=>setShowAdd(false)} T={T}>Cancel</Btn>

    </div>
  );

/* ── MILEAGE ────────────────────────────────────────────────── */

              padding:'10px 14px',fontSize:14,width:'100%',fontFamily:"'Inter',sans-serif",outline:'none'}}>
            {purposes.map(p=><option key={p}>{p}</option>)}

/* ── REPORTS ────────────────────────────────────────────────── */
function ReportsPage({inventory,expenses,T}){
  const [period,setPeriod]=useState('Monthly');
  const sold=inventory.filter(i=>i.status==='Sold');
  const gross=sold.reduce((s,i)=>s+i.price,0);
  const cogs=sold.reduce((s,i)=>s+i.cost,0);
  const fees=sold.reduce((s,i)=>s+i.price*0.1315,0);
  const expT=expenses.reduce((s,e)=>s+e.amount,0);
  const net=gross-cogs-fees;
  const catPerf=[...new Set(sold.map(i=>i.category))].map(cat=>({cat,count:sold.filter(i=>i.category===cat).length,rev:sold.filter(i=>i.category===cat).reduce((s,i)=>s+i.price,0)})).sort((a,b)=>b.rev-a.rev);
  const platPerf=[...new Set(sold.map(i=>i.platform))].map(p=>({p,count:sold.filter(i=>i.platform===p).length,rev:sold.filter(i=>i.platform===p).reduce((s,i)=>s+i.price,0)})).sort((a,b)=>b.rev-a.rev);
  const pCols=[T.cyan,BRAND.magenta,BRAND.yellow,T.success,T.warning];

  return(
    <div style={{padding:'24px 28px',overflowY:'auto',flex:1}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:10}}>
        <div style={{fontSize:26,fontWeight:800,color:T.text,letterSpacing:-0.5}}>Reports</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {['Daily','Weekly','Monthly','YTD'].map(p=>(
            <button key={p} onClick={()=>setPeriod(p)} style={{background:period===p?BRAND.yellow:T.surface,
              color:period===p?'#111':T.muted,border:`1px solid ${period===p?BRAND.yellow:T.border}`,
              borderRadius:20,padding:'7px 14px',fontSize:13,fontWeight:600,cursor:'pointer',
              fontFamily:"'Inter',sans-serif",transition:'all 0.15s'}}>{p}</button>
          ))}
        </div>
      </div>

      {/* P&L */}
      <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:20,padding:24,
        marginBottom:16,boxShadow:`0 2px 8px ${T.shadow}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18,flexWrap:'wrap',gap:10}}>
          <div style={{fontSize:16,fontWeight:700,color:T.text}}>P&L Summary — {period}</div>
          <Btn small variant="secondary" icon="download" T={T}>Export PDF</Btn>
        </div>
        {[['Number of Sales',sold.length,T.text],['Gross Sales',`$${gross.toFixed(2)}`,T.text],
          ['Cost of Goods Sold',`$${cogs.toFixed(2)}`,T.text],['Platform Fees',`$${fees.toFixed(2)}`,T.text],
          ['Business Expenses',`$${expT.toFixed(2)}`,T.text],['Sales Tax','$0.00',T.muted]].map(([l,v,col])=>(
          <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'11px 0',borderBottom:`1px solid ${T.border}`}}>
            <span style={{fontSize:14,color:T.muted}}>{l}</span>
            <span style={{fontSize:14,fontWeight:600,color:col}}>{v}</span>
          </div>
        ))}
        <div style={{display:'flex',justifyContent:'space-between',padding:'16px 0 4px',marginTop:4}}>
          <span style={{fontSize:16,fontWeight:700,color:T.text}}>Net Adjusted Profit</span>
          <span style={{fontSize:24,fontWeight:900,color:net>=0?T.success:T.danger}}>${net.toFixed(2)}</span>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(230px,1fr))',gap:14,marginBottom:16}}>
        <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:18,padding:20,boxShadow:`0 1px 4px ${T.shadow}`}}>
          <SectionLabel text="Category Performance" T={T}/>
          {catPerf.map(c=>(
            <div key={c.cat} style={{marginBottom:14}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                <span style={{fontSize:14,color:T.text,display:'flex',alignItems:'center',gap:8}}>
                  {c.cat}
                  <Badge text={c.count} color={BRAND.yellow} T={T}/>
                </span>
                <span style={{fontSize:14,fontWeight:700,color:T.text}}>${c.rev.toFixed(2)}</span>
              </div>
              <ProgressBar pct={gross>0?(c.rev/gross)*100:0} color={BRAND.yellow} T={T}/>
            </div>
          ))}
        </div>
        <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:18,padding:20,boxShadow:`0 1px 4px ${T.shadow}`}}>
          <SectionLabel text="Platform Performance" T={T}/>
          {platPerf.map((pl,i)=>(
            <div key={pl.p} style={{marginBottom:14}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                <span style={{fontSize:14,color:T.text,display:'flex',alignItems:'center',gap:8}}>
                  {pl.p}
                  <Badge text={pl.count} color={pCols[i%5]} T={T}/>
                </span>
                <span style={{fontSize:14,fontWeight:700,color:T.text}}>${pl.rev.toFixed(2)}</span>
              </div>
              <ProgressBar pct={gross>0?(pl.rev/gross)*100:0} color={pCols[i%5]} T={T}/>
            </div>
          ))}
        </div>
      </div>

      <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:18,padding:20,boxShadow:`0 1px 4px ${T.shadow}`}}>
        <SectionLabel text="Capital Tied Up" T={T}/>
        <div style={{display:'flex',gap:28,flexWrap:'wrap'}}>
          <div>
            <div style={{fontSize:12,color:T.muted,fontWeight:500,marginBottom:4}}>Cost of Goods Unsold</div>
            <div style={{fontSize:24,fontWeight:800,color:T.warning}}>${inventory.filter(i=>i.status!=='Sold').reduce((s,i)=>s+i.cost,0).toFixed(2)}</div>
          </div>
          <div>
            <div style={{fontSize:12,color:T.muted,fontWeight:500,marginBottom:4}}>Potential Profit</div>
            <div style={{fontSize:24,fontWeight:800,color:T.success}}>${inventory.filter(i=>i.status!=='Sold').reduce((s,i)=>s+(i.price-i.cost),0).toFixed(2)}</div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── LABELS PAGE ─────────────────────────────────────────── */
function LabelsPage({inventory,T}){
  const [search,setSearch]=useState('');
  const [selected,setSelected]=useState(new Set());
  const [tmpl,setTmpl]=useState('Avery 5160');
  const [byQty,setByQty]=useState(false);
  const [showPrint,setShowPrint]=useState(false);
  const tmpls=['Avery 5160','Avery 8160','Dymo 30252','Zebra 2x1'];
  const tmplDesc={'Avery 5160':'30 per page · 1" × 2.625"','Avery 8160':'30 per page · inkjet optimized','Dymo 30252':'1 per sheet · 1.125" × 3.5"','Zebra 2x1':'1" × 2" direct thermal'};
  const filtered=inventory.filter(i=>!search||(i.title+i.sku).toLowerCase().includes(search.toLowerCase()));
  function toggle(id){const s=new Set(selected);s.has(id)?s.delete(id):s.add(id);setSelected(s);}
  function toggleAll(){selected.size===filtered.length?setSelected(new Set()):setSelected(new Set(filtered.map(i=>i.id)));}
  const labelCount=byQty?[...selected].reduce((s,id)=>{const it=inventory.find(i=>i.id===id);return s+(it?it.qty:1);},0):selected.size;
  const statusColor={Listed:T.cyan,Sold:T.success,Unlisted:T.warning,Returned:T.danger};
  return(
    <div style={{padding:'24px 28px',overflowY:'auto',flex:1}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div style={{fontSize:26,fontWeight:800,color:T.text,letterSpacing:-0.5}}>Labels</div>
        {selected.size>0&&<Btn ic="print" T={T} onClick={()=>setShowPrint(true)}>Print {labelCount} Label{labelCount!==1?'s':''}</Btn>}
      </div>
      {/* Template */}
      <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:18,padding:'18px 22px',marginBottom:14,boxShadow:`0 1px 4px ${T.shadow}`}}>
        <div style={{fontSize:11,fontWeight:700,color:T.muted,letterSpacing:.8,textTransform:'uppercase',marginBottom:12}}>Label Template</div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:14}}>
          {tmpls.map(t=>(
            <button key={t} onClick={()=>setTmpl(t)} style={{background:tmpl===t?BRAND.yellow:T.surface,color:tmpl===t?'#111':T.muted,border:`1px solid ${tmpl===t?BRAND.yellow:T.border}`,borderRadius:10,padding:'8px 16px',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:"'Inter',sans-serif",transition:'all .14s'}}>{t}</button>
          ))}
        </div>
        <div style={{fontSize:12,color:T.muted,marginBottom:14}}>{tmplDesc[tmpl]}</div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <input type="checkbox" id="byqtylbl" checked={byQty} onChange={e=>setByQty(e.target.checked)} style={{width:16,height:16,accentColor:BRAND.yellow,cursor:'pointer'}}/>
          <label htmlFor="byqtylbl" style={{fontSize:14,color:T.text,cursor:'pointer'}}>Print by Quantity — one label per unit (e.g. qty 10 = 10 labels)</label>
        </div>
      </div>
      {/* Search + select all */}
      <div style={{display:'flex',gap:10,marginBottom:12,alignItems:'center'}}>
        <div style={{flex:1,display:'flex',alignItems:'center',background:T.inputBg,border:`1.5px solid ${T.border}`,borderRadius:12,padding:'0 14px',gap:8}}>
          <Icon name="search" size={15} color={T.muted}/>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by title or SKU…" style={{background:'transparent',border:'none',outline:'none',color:T.text,padding:'10px 0',fontSize:14,width:'100%'}}/>
        </div>
        <button onClick={toggleAll} style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:10,padding:'9px 14px',fontSize:13,fontWeight:600,color:T.muted,cursor:'pointer',fontFamily:"'Inter',sans-serif",display:'flex',alignItems:'center',gap:6}}>
          <Icon name={selected.size===filtered.length?'check':'layers'} size={14} color={T.muted}/>
          {selected.size===filtered.length?'Deselect All':'Select All'}
        </button>
      </div>
      {selected.size>0&&(
        <div style={{background:BRAND.yellow+'18',border:`1px solid ${BRAND.yellow}38`,borderRadius:12,padding:'12px 16px',marginBottom:12,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <span style={{fontSize:13,fontWeight:600,color:T.text}}>{selected.size} item{selected.size!==1?'s':''} selected · {labelCount} label{labelCount!==1?'s':''} to print</span>
          <Btn sm ic="print" T={T} onClick={()=>setShowPrint(true)}>Print Labels</Btn>
        </div>
      )}
      <div style={{display:'flex',flexDirection:'column',gap:7}}>
        {filtered.map(item=>{
          const isSel=selected.has(item.id);
          const sc=statusColor[item.status]||T.muted;
          return(
            <div key={item.id} onClick={()=>toggle(item.id)}
              style={{background:T.card,border:`1.5px solid ${isSel?BRAND.yellow:T.border}`,borderRadius:13,padding:'12px 16px',display:'flex',alignItems:'center',gap:14,cursor:'pointer',transition:'border-color .14s',boxShadow:`0 1px 3px ${T.shadow}`}}>
              <div style={{width:22,height:22,borderRadius:6,border:`2px solid ${isSel?BRAND.yellow:T.faint||T.border}`,background:isSel?BRAND.yellow:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                {isSel&&<Icon name="check" size={13} color="#111" strokeWidth={2.5}/>}
              </div>
              <div style={{width:40,height:40,borderRadius:10,background:T.surface,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>
                {item.category==='Video Games'?'🎮':item.category==='Electronics'?'📱':item.category==='Clothing'?'👕':'📦'}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:600,color:T.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.title}</div>
                <div style={{display:'flex',gap:6,alignItems:'center',marginTop:4,flexWrap:'wrap'}}>
                  <Badge text={item.sku} color={BRAND.magenta} T={T}/>
                  <span style={{fontSize:12,color:T.muted}}>{item.category}</span>
                  {item.location&&<span style={{fontSize:11,color:T.muted,display:'flex',alignItems:'center',gap:3}}><Icon name="mappin" size={11} color={T.muted}/>  {item.location}</span>}
                </div>
              </div>
              <div style={{textAlign:'right',flexShrink:0}}>
                <div style={{fontSize:14,fontWeight:700,color:T.text}}>${item.price}</div>
                <div style={{fontSize:11,color:T.muted,marginBottom:4}}>qty: {item.qty||1}</div>
                <Badge text={item.status} color={sc} T={T}/>
              </div>
              <Icon name="qr" size={22} color={isSel?BRAND.yellow:T.muted||T.border}/>
            </div>
          );
        })}
        {filtered.length===0&&(
          <div style={{textAlign:'center',padding:'56px 24px',color:T.muted}}>
            <Icon name="label" size={48} color={T.muted} style={{opacity:.3}}/>
            <div style={{fontSize:16,fontWeight:700,color:T.text,marginTop:14}}>No items found</div>
          </div>
        )}
      </div>
      {showPrint&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:300,backdropFilter:'blur(4px)'}} onClick={()=>setShowPrint(false)}>
          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:22,padding:28,width:440,boxShadow:'0 24px 64px rgba(0,0,0,.35)'}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:22}}>
              <div style={{fontSize:17,fontWeight:700,color:T.text}}>Print Labels</div>
              <button onClick={()=>setShowPrint(false)} style={{background:T.surface,border:'none',borderRadius:9,padding:7,cursor:'pointer'}}><Icon name="x" size={15} color={T.muted}/></button>
            </div>
            <div style={{background:T.surface,border:`1.5px solid ${BRAND.yellow}38`,borderRadius:14,padding:'16px 18px',marginBottom:16,display:'flex',alignItems:'center',gap:14}}>
              <div style={{width:52,height:52,borderRadius:12,background:T.card,display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="qr" size={28} color={BRAND.yellow}/></div>
              <div><div style={{fontSize:15,fontWeight:700,color:T.text}}>{tmpl}</div><div style={{fontSize:13,color:T.muted,marginTop:2}}>{tmplDesc[tmpl]}</div></div>
            </div>
            <div style={{background:T.surface,borderRadius:12,padding:'14px 16px',marginBottom:16}}>
              {[['Items selected',selected.size],['Labels to print',labelCount],['Print by quantity',byQty?'Yes':'No']].map(([l,v])=>(
                <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:`1px solid ${T.border}`}}>
                  <span style={{fontSize:14,color:T.muted}}>{l}</span>
                  <span style={{fontSize:14,fontWeight:700,color:T.text}}>{v}</span>
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:10}}>
              <Btn v="ghost" onClick={()=>setShowPrint(false)} T={T}>Cancel</Btn>
              <Btn ic="print" T={T} full onClick={()=>{alert(`Sending ${labelCount} label${labelCount!==1?'s':''} to printer...\n\nTemplate: ${tmpl}\nItems: ${selected.size}`);setShowPrint(false);}}>
                Print {labelCount} Label{labelCount!==1?'s':''}
              </Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


/* ── IMPORT / EXPORT PAGE ────────────────────────────────── */
function ExportPage({inventory,expenses,mileage,T}){
  const [tab,setTab]=useState('export');
  const [year,setYear]=useState('2026');
  const [exporting,setExporting]=useState(false);
  const [done,setDone]=useState(false);
  const [importText,setImportText]=useState('');
  const [importMsg,setImportMsg]=useState('');

  function downloadCSV(rows,filename){
    const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
    const blob=new Blob([csv],{type:'text/csv'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
  }
  function doExportInventory(){
    setExporting(true);setDone(false);
    setTimeout(()=>{
      downloadCSV([['SKU','Title','Category','Brand','Condition','Qty','Cost','Price','Status','Platform','Location','Days Listed'],...inventory.map(i=>[i.sku,i.title,i.category,i.brand,i.condition,i.qty,i.cost,i.price,i.status,i.platform,i.location,i.daysListed])],`rrh-inventory-${year}.csv`);
      setExporting(false);setDone(true);setTimeout(()=>setDone(false),4000);
    },1000);
  }
  function doExportExpenses(){downloadCSV([['Date','Description','Category','Amount','Recurring'],...expenses.map(e=>[e.date,e.title,e.category,e.amount,e.recurring?'Yes':'No'])],`rrh-expenses-${year}.csv`);}
  function doExportMileage(){downloadCSV([['Date','From','To','Miles','Purpose','Deduction'],...mileage.map(m=>[m.date,m.from,m.to,m.miles,m.purpose,m.deduction])],`rrh-mileage-${year}.csv`);}

  return(
    <div style={{padding:'24px 28px',overflowY:'auto',flex:1}}>
      <div style={{fontSize:26,fontWeight:800,color:T.text,letterSpacing:-0.5,marginBottom:20}}>Import / Export</div>

          <button key={id} onClick={()=>setTab(id)} style={{background:tab===id?BRAND.yellow:'transparent',color:tab===id?'#111':T.muted,border:'none',borderRadius:10,padding:'9px 20px',fontSize:14,fontWeight:600,cursor:'pointer',fontFamily:"'Inter',sans-serif",transition:'all .14s',display:'flex',alignItems:'center',gap:7}}>
            <Icon name={ic} size={15} color={tab===id?'#111':T.muted}/>{lbl}
          </button>
        ))}
      </div>

      {tab==='export'&&(
        <div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:16}}>
            {[[inventory.length,'Inventory Items','box',T.cyan],[expenses.length,'Expense Records','receipt',T.warning],[mileage.length,'Mileage Trips','car',T.success]].map(([v,l,i,c])=>(
              <div key={l} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:14,padding:'16px 18px',boxShadow:`0 1px 4px ${T.shadow}`,display:'flex',alignItems:'center',gap:12}}>
                <div style={{width:40,height:40,borderRadius:10,background:c+'1A',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name={i} size={20} color={c}/></div>
                <div><div style={{fontSize:22,fontWeight:800,color:T.text}}>{v}</div><div style={{fontSize:12,color:T.muted}}>{l}</div></div>
              </div>
            ))}
          </div>
          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:18,padding:'18px 22px',marginBottom:16,boxShadow:`0 1px 4px ${T.shadow}`}}>
            <div style={{fontSize:11,fontWeight:700,color:T.muted,letterSpacing:.8,textTransform:'uppercase',marginBottom:12}}>Select Year</div>

            <Icon name="checkCircle" size={20} color={T.success}/>
            <div style={{fontSize:14,fontWeight:600,color:T.success}}>Export complete — check your Downloads folder.</div>
          </div>}
          <div style={{background:T.cyan+'10',border:`1px solid ${T.cyan}28`,borderRadius:14,padding:'14px 18px',display:'flex',alignItems:'center',gap:12}}>
            <Icon name="info" size={18} color={T.cyan}/>
            <div style={{fontSize:13,color:T.text}}>Your data is securely stored in the cloud with daily automatic backups.</div>
          </div>
        </div>
      )}

      {tab==='import'&&(

            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>

                <div key={f} style={{display:'flex',gap:8,alignItems:'center',padding:'6px 0',borderBottom:`1px solid ${T.border}`}}>
                  <span style={{fontSize:12,background:T.surface,color:BRAND.magenta,borderRadius:6,padding:'2px 8px',fontWeight:600,border:`1px solid ${BRAND.magenta}28`,minWidth:76,textAlign:'center'}}>{f}</span>
                  <span style={{fontSize:13,color:T.muted}}>{l}</span>
                </div>
              ))}
            </div>
          </div>
          <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:18,padding:'18px 22px',boxShadow:`0 1px 4px ${T.shadow}`}}>
            <div style={{fontSize:11,fontWeight:700,color:T.muted,letterSpacing:.8,textTransform:'uppercase',marginBottom:12}}>Or Paste CSV Data</div>
            <textarea rows={6} value={importText} onChange={e=>setImportText(e.target.value)} placeholder={'sku,title,category,cost,price\nRC-001,"My Item","Clothing",5.00,25.00\n...'} style={{background:T.inputBg,border:`1.5px solid ${T.border}`,borderRadius:10,color:T.text,padding:'10px 14px',fontSize:13,width:'100%',resize:'vertical',outline:'none',fontFamily:"'Inter',sans-serif"}}/>
            {importMsg&&<div style={{background:T.success+'12',border:`1px solid ${T.success}28`,borderRadius:10,padding:'10px 14px',margin:'12px 0',fontSize:13,color:T.success,fontWeight:600}}>{importMsg}</div>}
            <Btn ic="upload" T={T} full onClick={()=>{if(importText.trim()){const lines=importText.trim().split('\n');setImportMsg('✓ Parsed '+( lines.length-1)+' row'+(lines.length!==2?'s':'')+' — review and confirm to import.');}else{setImportMsg('');}}} style={{marginTop:12}}>
              Parse & Preview
            </Btn>
          </div>
        </div>
      )}
    </div>
  );
}

              {/* Logo upload */}
              <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:18,padding:'22px 24px',boxShadow:`0 1px 4px ${T.shadow}`}}>

                <div style={{marginBottom:16,display:'flex',justifyContent:'center'}}>

              {/* Quick start guide */}
              <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:18,padding:'22px 24px',boxShadow:`0 1px 4px ${T.shadow}`}}>
                <div style={{fontSize:11,fontWeight:700,color:T.muted,letterSpacing:.8,textTransform:'uppercase',marginBottom:16}}>Quick Start Guide</div>
                {[
                  ['1','Set up your business profile','Fill in your name, logo, and contact info above. This appears on purchase orders and exported reports.'],
                  ['2','Add your inventory','Go to Inventory → Add Item, or use the Barcode scan shortcut to quickly add items you source.'],
                  ['3','Use the Profit Calculator','Before buying at a thrift store, use the Calculator to check ROI before committing to a purchase.'],
                  ['4','Track expenses & mileage','Every sourcing trip and shipping supply purchase adds up — log them for accurate tax deductions.'],
                  ['5','Run reports & export','At tax time, go to Reports → Export PDF to get an accountant-ready P&L statement.'],
                ].map(([n,title,desc])=>(
                  <div key={n} style={{display:'flex',gap:14,padding:'12px 0',borderBottom:`1px solid ${T.border}`}}>
                    <div style={{width:28,height:28,borderRadius:8,background:BRAND.yellow+'18',border:`1px solid ${BRAND.yellow}30`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:800,color:BRAND.yellow,flexShrink:0}}>{n}</div>
                    <div><div style={{fontSize:14,fontWeight:600,color:T.text,marginBottom:3}}>{title}</div><div style={{fontSize:12,color:T.muted,lineHeight:1.5}}>{desc}</div></div>
                  </div>
                ))}
              </div>

              {/* What's new */}
              <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:18,padding:'22px 24px',boxShadow:`0 1px 4px ${T.shadow}`}}>
                <div style={{fontSize:11,fontWeight:700,color:T.muted,letterSpacing:.8,textTransform:'uppercase',marginBottom:16}}>What's New · v1.0.0</div>
                {['10 fully-featured pages: Dashboard, Inventory, Calculator, Expenses, Mileage, Reports, Goals, Storage, Labels, Import/Export','Business profile with custom logo — appears on purchase orders and reports','Dark & Light mode toggle','Real CSV export for inventory, expenses, and mileage logs','Label printing for Avery 5160, Avery 8160, Dymo, and Zebra formats','Goal & challenge tracking with progress bars','Aging inventory detection and alerts'].map((item,i)=>(
                  <div key={i} style={{display:'flex',gap:10,padding:'8px 0',borderBottom:i<6?`1px solid ${T.border}`:'none',alignItems:'flex-start'}}>
                    <Icon name="check" size={14} color={T.success} style={{marginTop:2,flexShrink:0}}/>
                    <div style={{fontSize:13,color:T.text}}>{item}</div>
                  </div>
                ))}
              </div>

              {/* Roadmap */}
              <div style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:18,padding:'22px 24px',boxShadow:`0 1px 4px ${T.shadow}`}}>
                <div style={{fontSize:11,fontWeight:700,color:T.muted,letterSpacing:.8,textTransform:'uppercase',marginBottom:16}}>Planned Features</div>
                {['AI photo recognition & listing generator','Marketplace sync (eBay, Poshmark, Mercari API)','Purchase Order PDF generator','Barcode lookup with 690M+ product database','Bulk photo processing for inventory batches','AI pricing recommendations','Multi-user / team collaboration','Mobile PWA with offline support'].map((item,i)=>(
                  <div key={i} style={{display:'flex',gap:10,padding:'8px 0',borderBottom:i<7?`1px solid ${T.border}`:'none',alignItems:'flex-start'}}>
                    <Icon name="zap" size={14} color={BRAND.yellow} style={{marginTop:2,flexShrink:0}}/>
                    <div style={{fontSize:13,color:T.muted}}>{item}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Save button row at bottom */}
          {tab!=='about'&&<div style={{display:'flex',justifyContent:'flex-end',paddingTop:8}}>
            <Btn ic="check" T={T} onClick={save}>Save Changes</Btn>
          </div>}
        </div>
      </div>

      {/* ── FOOTER ── */}
      <div style={{marginTop:32,paddingTop:20,borderTop:`1px solid ${T.border}`,textAlign:'center'}}>
        <div style={{fontSize:12,color:T.muted,marginBottom:6}}>
          Made with <span style={{color:T.danger}}>♥</span> by{' '}
          <a href="https://retroreplayhub.com" target="_blank" rel="noopener noreferrer" style={{color:BRAND.yellow,textDecoration:'none',fontWeight:600}}>RetroReplayHub.com</a>
          {' '}· Free for the reseller community
        </div>
        <div style={{fontSize:11,color:T.faint||T.muted}}>
          Reseller Central v1.0.0 · Free & Open Source · No Support SLA · Updates Released as Available
        </div>
        <div style={{fontSize:11,color:T.faint||T.muted,marginTop:4}}>
          <a href="https://github.com/retroreplayhub/reseller-os" target="_blank" rel="noopener noreferrer" style={{color:T.muted,textDecoration:'none'}}>GitHub</a>
          {' · '}
          <span style={{cursor:'pointer',color:T.muted}} onClick={()=>setTab('about')}>Help & About</span>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [dark,setDark]=useState(true);
  const T=dark?DARK:LIGHT;
  const [page,setPage]=useState('home');
  const [col,setCol]=useState(false);
  const [inventory,setInventory]=useState(INIT_INV);
  const [expenses,setExpenses]=useState(INIT_EXP);
  const [mileage,setMileage]=useState(INIT_MILE);
  const [goals,setGoals]=useState(INIT_GOALS);
  const BIZ_DEFAULT={name:'My Reseller Shop',tagline:'Games • Movies • Music • Fashion',ownerName:'',email:'',phone:'',address:'',city:'',state:'',zip:'',country:'US',website:'',taxId:'',logo:null,currency:'USD',mileageRate:0.59,timezone:'America/New_York'};
  const [biz,setBiz]=useState(()=>{try{const s=localStorage.getItem('rrh_biz');return s?JSON.parse(s):BIZ_DEFAULT;}catch{return BIZ_DEFAULT;}});

  useEffect(()=>{try{localStorage.setItem('rrh_biz',JSON.stringify(biz));}catch{}},[biz]);
  useEffect(()=>{
    document.body.style.background=T.bg;
    document.body.style.color=T.text;
    const st=document.getElementById('scrollStyle');
    if(st)st.textContent=`::-webkit-scrollbar-thumb{background:${T.scrollThumb}!important}`;
  },[dark,T]);

  const nav=NAV_ITEMS.find(n=>n.id===page)||NAV_ITEMS[0];

  const PAGES={
    home:<HomePage inventory={inventory} expenses={expenses} mileage={mileage} goals={goals} T={T} onNav={setPage}/>,
    inventory:<InventoryPage inventory={inventory} setInventory={setInventory} T={T}/>,
    profit:<ProfitPage T={T}/>,
    expenses:<ExpensesPage expenses={expenses} setExpenses={setExpenses} T={T}/>,
    mileage:<MileagePage mileage={mileage} setMileage={setMileage} T={T}/>,
    reports:<ReportsPage inventory={inventory} expenses={expenses} T={T}/>,
    goals:<GoalsPage goals={goals} setGoals={setGoals} T={T}/>,
    storage:<StoragePage inventory={inventory} T={T}/>,
    labels:<LabelsPage inventory={inventory} T={T}/>,
    export:<ExportPage inventory={inventory} expenses={expenses} mileage={mileage} T={T}/>,
    settings:<SettingsPage biz={biz} setBiz={setBiz} dark={dark} setDark={setDark} T={T}/>,
  };

  return(
    <div style={{display:'flex',height:'100vh',background:T.bg,color:T.text,overflow:'hidden',transition:'background 0.2s,color 0.2s'}}>
      <style id="scrollStyle">{`::-webkit-scrollbar-thumb{background:${T.scrollThumb}!important}`}</style>
      <Sidebar active={page} onNav={setPage} col={col} setCol={setCol} T={T} dark={dark} setDark={setDark} biz={biz}/>

      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        {/* Top bar */}
        <div style={{height:58,borderBottom:`1px solid ${T.border}`,display:'flex',alignItems:'center',
          justifyContent:'space-between',padding:'0 28px',background:T.topbar,flexShrink:0,
          boxShadow:`0 1px 4px ${T.shadow}`}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <Icon name={nav.icon} size={17} color={T.muted}/>
            <span style={{fontSize:14,fontWeight:600,color:T.text}}>{nav.label}</span>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <div style={{width:7,height:7,borderRadius:'50%',background:T.success}}/>
              <span style={{fontSize:12,color:T.muted,fontWeight:500}}>Live</span>
            </div>
            <div style={{width:1,height:20,background:T.border}}/>
            <button onClick={()=>setPage('settings')} title="Settings" style={{background:'none',border:'none',cursor:'pointer',padding:3,lineHeight:0,borderRadius:8}}>
              <Icon name="settings" size={17} color={T.muted}/>
            </button>
            <div onClick={()=>setPage('settings')} style={{width:32,height:32,borderRadius:10,background:biz&&biz.logo?'transparent':`linear-gradient(135deg,${BRAND.yellow},${BRAND.magenta})`,display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',cursor:'pointer',flexShrink:0}}>
              {biz&&biz.logo?<img src={biz.logo} alt="logo" style={{width:'100%',height:'100%',objectFit:'cover'}}/>:<span style={{fontSize:14,fontWeight:900,color:'#111',fontFamily:"'Inter',sans-serif"}}>{biz&&biz.name?biz.name.charAt(0).toUpperCase():'R'}</span>}
            </div>
          </div>
        </div>

        {PAGES[page]}
        {/* ── GLOBAL FOOTER BAR ── */}
        <div style={{background:T.card,borderTop:`1px solid ${T.border}`,padding:'8px 28px',display:'flex',alignItems:'center',justifyContent:'space-between',flexShrink:0}}>
          <div style={{fontSize:11,color:T.muted}}>
            Made with ♥ by{' '}
            <a href="https://retroreplayhub.com" target="_blank" rel="noopener noreferrer" style={{color:BRAND.yellow,textDecoration:'none',fontWeight:600}}>RetroReplayHub.com</a>
            {' '}· Free reseller tool · No support SLA · Updates released as available
          </div>
          <div style={{display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
            <a href="https://github.com/retroreplayhub/reseller-os" target="_blank" rel="noopener noreferrer" style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:T.muted,textDecoration:'none'}}>
              <Icon name="github" size={13} color={T.muted}/>GitHub
            </a>
            <span style={{fontSize:11,color:T.muted,cursor:'pointer'}} onClick={()=>setPage('settings')}>v1.0.0</span>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
